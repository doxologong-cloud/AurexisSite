<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AUREX OS TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Consolas&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: #00ffcc; font-family: 'Consolas', monospace; overflow: hidden; }

        /* ─── TERMINAL ─── */
        #main-console { display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        .console-output { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 20px; font-size: 1rem; line-height: 1.6; }
        .console-input-row { display: flex; align-items: center; border-top: 1px dashed #00ffcc44; padding-top: 15px; }
        .console-input { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: 'Consolas', monospace; font-size: 1.2rem; outline: none; margin-left: 10px; }

        /* ─── PHASE 1-2: PARTICLE FIGURE ─── */
        #dive-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 100; display: none; overflow: hidden;
            /* CRITICAL: perspective here makes the monitor 3D */
            perspective: 900px;
        }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #loop-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(5rem, 14vw, 12rem); color: rgba(255,0,51,0);
            font-weight: 900; letter-spacing: 15px;
            text-shadow: 0 0 80px red, 0 0 160px red, 0 0 300px rgba(255,0,0,0.3);
            z-index: 2; pointer-events: none; text-align: center; width: 100%;
            transition: color 0.5s;
        }

        /* ─── PHASE 3: 3D MONITOR ─── */
        /* CSS monitor placed in perspective container (dive-overlay) */
        #monitor-wrap {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(-4000px);
            width: 560px; height: 380px;
            z-index: 5; opacity: 0;
        }
        #monitor-frame {
            width: 100%; height: 100%;
            background: #111; border: 18px solid #222;
            border-radius: 14px;
            box-shadow:
                0 0 0 2px #444,
                0 0 40px rgba(0,255,204,0.4),
                inset 0 0 30px rgba(0,255,204,0.08);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        /* Screen glow scan */
        #monitor-frame::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: scanSheen 3s ease-in-out infinite;
        }
        @keyframes scanSheen { 0%{left:-100%} 100%{left:200%} }
        #monitor-screen {
            width: 100%; height: 100%;
            font-family: 'Consolas', monospace; font-size: 0.8rem;
            color: #00ffcc; padding: 18px; display: flex;
            flex-direction: column; gap: 5px;
        }
        .mline { opacity: 0; animation: fadeInLine 0.25s forwards; }
        @keyframes fadeInLine { to { opacity:1; } }

        /* Stand */
        #monitor-stand-wrap {
            position: absolute; bottom: -80px; left: 50%;
            transform: translateX(-50%);
        }
        #monitor-neck {
            width: 0; height: 0;
            border-left: 55px solid transparent;
            border-right: 55px solid transparent;
            border-top: 75px solid #222;
            margin: 0 auto;
        }
        #monitor-foot {
            width: 210px; height: 22px;
            background: #1e1e1e; border-radius: 5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            margin-top: -2px;
        }

        /* Dive keyframe — same technique as original Gemini */
        @keyframes diveIntoMonitor {
            0%   { transform: translate(-50%,-50%) translateZ(-4000px); opacity:0; }
            8%   { opacity:1; }
            75%  { transform: translate(-50%,-50%) translateZ(600px);  opacity:1;
                   filter: drop-shadow(0 0 80px #00ffcc); }
            90%  { transform: translate(-50%,-50%) translateZ(1100px); opacity:1; filter: brightness(3); }
            100% { transform: translate(-50%,-50%) translateZ(1400px); opacity:1; filter: brightness(8) saturate(0); }
        }
        .do-dive { animation: diveIntoMonitor 6s cubic-bezier(0.65,0,0.1,1) forwards; }

        /* Flash */
        #flash { position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:none; opacity:0; }

        /* ─── PHASE 4: BACKROOMS + LYRICS ─── */
        #backrooms-phase {
            display: none; position: fixed; top:0; left:0;
            width: 100vw; height: 100vh; z-index: 300; overflow: hidden;
        }
        /* THREE.js canvas fills this */
        #br-three-canvas {
            position: absolute; top:0; left:0; width:100%; height:100%;
        }

        /* Cinematic letterbox */
        #br-letterbox-top {
            position: absolute; top:0; left:0; width:100%; height:80px;
            background: #000; z-index: 10; pointer-events: none;
        }
        #br-letterbox-bot {
            position: absolute; bottom:0; left:0; width:100%; height:80px;
            background: #000; z-index: 10; pointer-events: none;
        }

        /* Scanlines */
        #br-scan {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 6px);
            z-index: 9; pointer-events: none; opacity: 0.5;
        }
        /* Vignette */
        #br-vig {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
            z-index: 8; pointer-events: none;
        }

        /* Lyrics display */
        #br-lyric {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20; text-align: center; pointer-events: none;
            opacity: 0; transition: opacity 0.8s ease;
            white-space: pre-line;
            line-height: 1.15;
        }
        #br-lyric.big {
            font-family: 'Bebas Neue', 'Consolas', monospace;
            font-size: clamp(3rem, 10vw, 9rem);
            font-weight: 900;
            letter-spacing: 8px;
        }
        #br-lyric.small {
            font-family: 'Consolas', monospace;
            font-size: clamp(1rem, 3vw, 1.8rem);
            letter-spacing: 4px;
        }
        #br-lyric.med {
            font-family: 'Consolas', monospace;
            font-size: clamp(1.6rem, 5vw, 3.5rem);
            letter-spacing: 6px;
            font-weight: 600;
        }

        /* Exit hint */
        #br-hint {
            position: absolute; bottom: 90px; left: 50%;
            transform: translateX(-50%);
            color: rgba(200,168,75,0.35);
            font-size: 0.72rem; letter-spacing: 3px;
            z-index: 20; opacity: 0; transition: opacity 2s;
        }

        /* Glitch */
        @keyframes glitch {
            0%  { transform: translate(-50%,-50%) translate(0); }
            20% { transform: translate(-50%,-50%) translate(-4px,1px); filter: hue-rotate(90deg); }
            40% { transform: translate(-50%,-50%) translate(4px,-2px); }
            60% { transform: translate(-50%,-50%) translate(-2px,3px); }
            80% { transform: translate(-50%,-50%) translate(3px,-1px); }
            100%{ transform: translate(-50%,-50%) translate(0); }
        }
        .glitch-anim { animation: glitch 0.07s infinite; }

        @keyframes glitchBody {
            0%  { transform: translate(0); }
            30% { transform: translate(-3px, 1px); filter: hue-rotate(120deg); }
            60% { transform: translate(3px,-1px); }
            100%{ transform: translate(0); }
        }
    </style>
</head>
<body>

<div id="flash"></div>

<!-- ─── PHASES 1-3: PARTICLE + MONITOR ─── -->
<div id="dive-overlay">
    <canvas id="particle-canvas"></canvas>
    <div id="loop-text">ПЕТЛЯ</div>

    <div id="monitor-wrap">
        <div id="monitor-frame">
            <div id="monitor-screen"></div>
        </div>
        <div id="monitor-stand-wrap">
            <div id="monitor-neck"></div>
            <div id="monitor-foot"></div>
        </div>
    </div>
</div>

<!-- ─── PHASE 4: BACKROOMS ─── -->
<div id="backrooms-phase">
    <div id="br-three-canvas"></div>
    <div id="br-vig"></div>
    <div id="br-scan"></div>
    <div id="br-letterbox-top"></div>
    <div id="br-letterbox-bot"></div>
    <div id="br-lyric" class="big"></div>
    <div id="br-hint">[ нажми любую клавишу ]</div>
</div>

<!-- ─── TERMINAL ─── -->
<div id="main-console">
    <div style="border-bottom:1px dashed #00ffcc33;padding-bottom:15px;margin-bottom:20px;opacity:0.55;font-size:0.85rem;">
        AUREX OS TERMINAL v2.4<br>
        <span style="color:#555">help</span> — команды &nbsp;|&nbsp; <span style="color:#ff0033">dox</span> — запустить петлю
    </div>
    <div id="console-output" class="console-output">
        <div style="color:#3a5a4a;">&gt; Инициализация... <span style="color:#4caf50;">OK</span></div>
        <div style="color:#3a5a4a;">&gt; Ожидание команды.</div>
    </div>
    <div class="console-input-row">
        <span style="color:#00ffcc;">root@vault:~#</span>
        <input type="text" id="console-input" class="console-input" autocomplete="off" autofocus>
    </div>
</div>

<script>
// ══════════════════════════════════════════════
//  TERMINAL
// ══════════════════════════════════════════════
const consoleInput  = document.getElementById('console-input');
const consoleOutput = document.getElementById('console-output');

consoleInput.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const cmd = consoleInput.value.trim();
    consoleInput.value = '';
    if (!cmd) return;
    const line = document.createElement('div');
    line.innerHTML = `<span style="color:#00ffcc;">root@vault:~#</span> <span style="color:#eee;">${cmd}</span>`;
    consoleOutput.appendChild(line);
    runCmd(cmd.toLowerCase());
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
});

function out(html, col='#4a7a6a') {
    const d = document.createElement('div');
    d.style.color = col; d.innerHTML = html;
    consoleOutput.appendChild(d);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
}

function runCmd(cmd) {
    if (cmd === 'help') {
        out(`help · clear · history · glitch · <span style="color:#ff0033;font-weight:bold;">dox</span>`);
    } else if (cmd === 'clear') {
        consoleOutput.innerHTML = '';
    } else if (cmd === 'history') {
        out('[2021] Петля запущена.<br>[2024] Потеря связи.<br>[2026] Хранилище восстановлено.<br>[????] <span style="color:#ff0033">ДАННЫЕ ПОВРЕЖДЕНЫ</span>');
    } else if (cmd === 'glitch') {
        document.body.style.animation = 'glitchBody 0.07s infinite';
        setTimeout(()=>document.body.style.animation='', 700);
    } else if (cmd === 'dox') {
        out('<span style="color:#ff0033;">▶ ПРОТОКОЛ ДЕЖАВЮ АКТИВИРОВАН</span>');
        setTimeout(triggerDox, 1000);
    } else {
        out(`<span style="color:#444;">команда не найдена: ${cmd}</span>`);
    }
}

// ══════════════════════════════════════════════
//  AUDIO + WEB AUDIO
// ══════════════════════════════════════════════
const audioEl = new Audio('/static/assets/loop_music.m4a');
audioEl.loop = true;
let analyser, freqData;

function initAudio() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        ctx.createMediaElementSource(audioEl).connect(analyser);
        analyser.connect(ctx.destination);
        freqData = new Uint8Array(analyser.frequencyBinCount);
    } catch(e) {}
}

function getBass() {
    if (analyser && freqData) {
        analyser.getByteFrequencyData(freqData);
        let s = 0;
        for (let i=0;i<6;i++) s += freqData[i];
        return s / 6 / 255;
    }
    return 0.1 + 0.08 * Math.sin(Date.now() * 0.0008);
}

// ══════════════════════════════════════════════
//  PHASE 1-2: PARTICLE FIGURE
// ══════════════════════════════════════════════
let pCanvas, pCtx, particles = [], bgDots = [];
let animId, doxT = 0, speed = 1, phase = 'walk';

// Human body keypoints (normalized 0-1 relative to figure bounding box)
const BODY = [
    // [cx, cy, rx, ry, count, group]
    [0.50, 0.10, 0.075, 0.075, 40,  'head'],   // head
    [0.50, 0.10, 0.045, 0.045, 20,  'head'],   // inner head
    [0.50, 0.30, 0.16,  0.14,  90,  'torso'],  // chest
    [0.50, 0.42, 0.13,  0.08,  50,  'torso'],  // waist
    [0.32, 0.27, 0.05,  0.11,  28,  'larm'],   // left upper arm
    [0.68, 0.27, 0.05,  0.11,  28,  'rarm'],   // right upper arm
    [0.28, 0.40, 0.045, 0.10,  22,  'larm'],   // left forearm
    [0.72, 0.40, 0.045, 0.10,  22,  'rarm'],   // right forearm
    [0.42, 0.58, 0.06,  0.13,  32,  'lleg'],   // left thigh
    [0.58, 0.58, 0.06,  0.13,  32,  'rleg'],   // right thigh
    [0.40, 0.76, 0.05,  0.11,  26,  'lleg'],   // left shin
    [0.60, 0.76, 0.05,  0.11,  26,  'rleg'],   // right shin
    [0.38, 0.88, 0.07,  0.04,  16,  'lleg'],   // left foot
    [0.62, 0.88, 0.07,  0.04,  16,  'rleg'],   // right foot
];

const JOINTS = {
    head:[0.5,0.08], neck:[0.5,0.17],
    lSh:[0.37,0.23], rSh:[0.63,0.23],
    lEl:[0.31,0.36], rEl:[0.69,0.36],
    lHa:[0.27,0.47], rHa:[0.73,0.47],
    hip:[0.50,0.47], lHi:[0.44,0.50], rHi:[0.56,0.50],
    lKn:[0.41,0.67], rKn:[0.59,0.67],
    lFt:[0.39,0.85], rFt:[0.61,0.85],
};

function buildParticles() {
    particles = [];
    const W = pCanvas.width, H = pCanvas.height;
    // Figure takes 65% of screen height, centered
    const FH = H * 0.70;
    const FW = FH * 0.55;
    const FX = W / 2 - FW / 2;
    const FY = H / 2 - FH / 2;

    BODY.forEach(([cx, cy, rx, ry, n, grp]) => {
        for (let i = 0; i < n; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.sqrt(Math.random()); // uniform disk
            const px = FX + (cx + rx * r * Math.cos(angle)) * FW;
            const py = FY + (cy + ry * r * Math.sin(angle)) * FH;
            particles.push({
                x: px, y: py,
                bx: px, by: py,  // base positions
                group: grp,
                cx: cx, cy: cy,   // normalized region center
                size: Math.random() * 2 + 1,
                bright: 0.6 + Math.random() * 0.4,
                phase: Math.random() * Math.PI * 2,
                // for figure shift reference
                FX, FY, FW, FH,
            });
        }
    });
}

function buildBg() {
    bgDots = [];
    for (let i = 0; i < 150; i++) bgDots.push({
        x: Math.random() * pCanvas.width,
        y: Math.random() * pCanvas.height,
        vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
        s: Math.random()*1.5+0.3, a: Math.random()*0.2+0.03
    });
}

function animateFigure() {
    animId = requestAnimationFrame(animateFigure);
    doxT += 0.016;

    const fade = phase==='acc' ? 0.22 : 0.16;
    pCtx.fillStyle = `rgba(0,0,0,${fade})`;
    pCtx.fillRect(0,0,pCanvas.width,pCanvas.height);

    // Background dots
    bgDots.forEach(d => {
        d.x += d.vx * speed; d.y += d.vy * speed;
        if(d.x<0) d.x=pCanvas.width; if(d.x>pCanvas.width) d.x=0;
        if(d.y<0) d.y=pCanvas.height; if(d.y>pCanvas.height) d.y=0;
        pCtx.beginPath(); pCtx.arc(d.x,d.y,d.s,0,Math.PI*2);
        pCtx.fillStyle=`rgba(0,255,204,${d.a})`; pCtx.fill();
    });

    const t = doxT * speed;
    const walkBob = Math.sin(t*2.5) * 5 * Math.min(speed, 3);

    // Walk: left-right arm/leg alternation
    particles.forEach(p => {
        let ox=0, oy=0;
        const isLeft = p.cx < 0.5;
        const isLeg = p.cy > 0.5;
        const isArm = p.cy > 0.22 && p.cy < 0.5 && (p.cx < 0.38 || p.cx > 0.62);

        if (isLeg) {
            const ph = isLeft ? t*2.2 : t*2.2 + Math.PI;
            const amp = 18 * Math.min(speed,4);
            const lean = p.cy > 0.75 ? 1.4 : 0.85;
            ox = Math.sin(ph) * amp * lean;
            oy = -Math.abs(Math.sin(ph)) * amp * 0.35;
        } else if (isArm) {
            const ph = isLeft ? t*2.2+Math.PI : t*2.2;
            const amp = 12 * Math.min(speed, 3);
            ox = Math.sin(ph) * amp;
            oy = Math.abs(Math.sin(ph)) * amp * 0.2;
        }

        oy += walkBob;

        if (phase === 'acc') {
            const sc = (speed-1)*0.4;
            ox += (Math.random()-0.5)*sc*4;
            oy += (Math.random()-0.5)*sc*4;
        }

        p.x = p.bx + ox;
        p.y = p.by + oy;

        // Color green→red as speed rises
        const r = Math.min(255, Math.round((speed-1)*14));
        const g = Math.max(0, 255 - r);
        const b = Math.max(0, 180 - r);
        const a = p.bright * (0.7 + 0.3*Math.abs(Math.sin(doxT*2+p.phase)));

        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size*(1+(speed-1)*0.08), 0, Math.PI*2);
        pCtx.fillStyle=`rgba(${r},${g},${b},${a})`; pCtx.fill();

        // Glow halo at high speed
        if (speed > 15) {
            pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size*4, 0, Math.PI*2);
            pCtx.fillStyle=`rgba(${r},${g},0,${0.04*Math.min(speed/15,1)})`; pCtx.fill();
        }
    });

    // Skeleton lines (subtle connective tissue)
    drawSkeleton(t, walkBob);

    // ПЕТЛЯ text
    const loopEl = document.getElementById('loop-text');
    if (phase === 'acc') {
        const op = Math.min((speed-1)/28, 1);
        loopEl.style.color = `rgba(255,0,51,${op})`;
        if (speed > 32) loopEl.classList.add('glitch-anim');
    }
}

function drawSkeleton(t, bob) {
    const sample = particles[0];
    if (!sample) return;
    const { FX, FY, FW, FH } = sample;

    function j(key) {
        const [nx,ny] = JOINTS[key];
        let dx=0, dy=0;
        if(key==='lKn'||key==='lFt'){const p=t*2.2;       dx=Math.sin(p)*18;  dy=-Math.abs(Math.sin(p))*7;}
        if(key==='rKn'||key==='rFt'){const p=t*2.2+Math.PI;dx=Math.sin(p)*18;  dy=-Math.abs(Math.sin(p))*7;}
        if(key==='lEl'||key==='lHa'){const p=t*2.2+Math.PI;dx=Math.sin(p)*10;}
        if(key==='rEl'||key==='rHa'){const p=t*2.2;        dx=Math.sin(p)*10;}
        return [FX+nx*FW+dx, FY+ny*FH+dy+bob];
    }

    const r = Math.min(180,(speed-1)*12);
    const g = Math.max(0,180-r);
    pCtx.strokeStyle=`rgba(${r},${g},120,${Math.max(0.03,0.12-(speed-1)*0.003)})`;
    pCtx.lineWidth=1.5;

    const links=[
        ['head','neck'],['neck','lSh'],['neck','rSh'],
        ['lSh','lEl'],['lEl','lHa'],['rSh','rEl'],['rEl','rHa'],
        ['neck','hip'],['hip','lHi'],['hip','rHi'],
        ['lHi','lKn'],['lKn','lFt'],['rHi','rKn'],['rKn','rFt'],
    ];
    links.forEach(([a,b])=>{
        const[x1,y1]=j(a),[x2,y2]=j(b);
        pCtx.beginPath();pCtx.moveTo(x1,y1);pCtx.lineTo(x2,y2);pCtx.stroke();
    });
    // head circle
    const[hx,hy]=j('head');
    pCtx.beginPath();pCtx.arc(hx,hy-FH*0.035,FH*0.05,0,Math.PI*2);pCtx.stroke();
}

// ══════════════════════════════════════════════
//  TRIGGER DOX
// ══════════════════════════════════════════════
function triggerDox() {
    document.getElementById('main-console').style.display='none';
    const overlay = document.getElementById('dive-overlay');
    overlay.style.display='block';

    initAudio();
    audioEl.play().catch(()=>{});

    pCanvas = document.getElementById('particle-canvas');
    pCtx = pCanvas.getContext('2d');
    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;
    buildParticles();
    buildBg();
    doxT=0; speed=1; phase='walk';
    animateFigure();

    // Phase 2: accelerate at 4s
    setTimeout(startAcc, 4000);
    // Phase 3: show monitor at 12s
    setTimeout(showMonitor, 12000);
}

function startAcc() {
    phase='acc';
    const iv = setInterval(()=>{
        speed += 0.35;
        if(speed>42) clearInterval(iv);
    },70);
}

// ══════════════════════════════════════════════
//  PHASE 3: 3D MONITOR DIVE
// ══════════════════════════════════════════════
function showMonitor() {
    cancelAnimationFrame(animId);
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    pCanvas.style.display='none';
    document.getElementById('loop-text').style.display='none';

    const mw = document.getElementById('monitor-wrap');
    mw.style.display='block';

    // Animate it flying in from distance using CSS class
    requestAnimationFrame(()=>{
        mw.style.opacity='1';
        mw.classList.add('do-dive');
    });

    // Type on screen
    const lines=[
        { t:1200, text:'> Протокол ДЕЖАВЮ активирован...', col:'#00ffcc'},
        { t:2000, text:'> Поиск начала петли...', col:'#00ffcc'},
        { t:2800, text:'> ОШИБКА: начало не найдено', col:'#ff0033'},
        { t:3600, text:'> Загрузка уровня 0...', col:'#ffbb33'},
        { t:4600, text:'> Добро пожаловать в петлю.', col:'#fff'},
    ];
    const scr = document.getElementById('monitor-screen');
    lines.forEach(l=>{
        setTimeout(()=>{
            const el=document.createElement('div');
            el.className='mline'; el.style.color=l.col;
            el.textContent=l.text; scr.appendChild(el);
        },l.t);
    });

    // Flash & enter backrooms after 6s
    setTimeout(()=>{
        const fl = document.getElementById('flash');
        fl.style.display='block'; fl.style.opacity='0'; fl.style.transition='opacity 0.3s';
        requestAnimationFrame(()=>{
            fl.style.opacity='1';
            setTimeout(()=>{
                document.getElementById('dive-overlay').style.display='none';
                fl.style.opacity='0';
                setTimeout(()=>{ fl.style.display='none'; startBackrooms(); }, 350);
            }, 450);
        });
    }, 6200);
}

const SCRIPT = [

let brScene, brCamera, brRenderer, brAnimId, brT=0;
let brShown=new Set();

function startBackrooms() {
    const phase4 = document.getElementById('backrooms-phase');
    phase4.style.display='block';

    const W=window.innerWidth, H=window.innerHeight;

    // ── THREE.JS SETUP ──
    brScene = new THREE.Scene();
    brScene.fog = new THREE.FogExp2(0x1a1100, 0.025);
    brScene.background = new THREE.Color(0x100d00);

    brCamera = new THREE.PerspectiveCamera(75, W/H, 0.1, 200);
    brCamera.position.set(0, 0, 0);

    brRenderer = new THREE.WebGLRenderer({ antialias: true });
    brRenderer.setSize(W, H);
    brRenderer.shadowMap.enabled = true;
    document.getElementById('br-three-canvas').appendChild(brRenderer.domElement);

    buildCorridor();
    buildLights();

    // Exit on key
    document.addEventListener('keydown', exitBackrooms, {once:true});
    setTimeout(()=>{ document.getElementById('br-hint').style.opacity='1'; }, 30000);

    renderBackrooms();
}

function buildCorridor() {
    // Corridor: 5 units wide, 3.5 units tall, 200 units long
    const CW=5, CH=3.5, CL=200;
    const mat = new THREE.MeshLambertMaterial({
        color: 0xc8a030, side: THREE.BackSide
    });

    // One big box for the corridor
    const geo = new THREE.BoxGeometry(CW, CH, CL);
    const corridor = new THREE.Mesh(geo, mat);
    corridor.position.set(0, 0, -CL/2);
    brScene.add(corridor);

    // Floor (darker)
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a6a15 });
    const floorGeo = new THREE.PlaneGeometry(CW, CL);
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(0, -CH/2, -CL/2);
    brScene.add(floor);

    // Ceiling tiles (grid lines via EdgesGeometry)
    const tileSize = 1.5;
    const tilesX = Math.ceil(CW/tileSize);
    const tilesZ = Math.ceil(CL/tileSize);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x9a7a10, transparent:true, opacity:0.3 });
    for(let z=0; z<=tilesZ; z++) {
        const geo2 = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-CW/2, CH/2-0.01, -z*tileSize),
            new THREE.Vector3( CW/2, CH/2-0.01, -z*tileSize),
        ]);
        brScene.add(new THREE.Line(geo2, edgeMat));
    }
    for(let x=0; x<=tilesX; x++) {
        const geo2 = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-CW/2+x*tileSize, CH/2-0.01, 0),
            new THREE.Vector3(-CW/2+x*tileSize, CH/2-0.01, -CL),
        ]);
        brScene.add(new THREE.Line(geo2, edgeMat));
    }

    // Floor grid
    const floorEdgeMat = new THREE.LineBasicMaterial({ color: 0x6a4a08, transparent:true, opacity:0.25 });
    for(let z=0; z<=tilesZ; z++) {
        const g = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-CW/2, -CH/2+0.01, -z*tileSize),
            new THREE.Vector3( CW/2, -CH/2+0.01, -z*tileSize),
        ]);
        brScene.add(new THREE.Line(g, floorEdgeMat));
    }

    // Wall panels (vertical lines every 2 units on walls)
    const wallLineMat = new THREE.LineBasicMaterial({ color: 0xb08820, transparent:true, opacity:0.2 });
    for(let z=0; z<CL; z+=2) {
        [-CW/2+0.01, CW/2-0.01].forEach(x=>{
            const g = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(x, -CH/2, -z),
                new THREE.Vector3(x,  CH/2, -z),
            ]);
            brScene.add(new THREE.Line(g, wallLineMat));
        });
    }
}

function buildLights() {
    // Ambient — very dim warm
    brScene.add(new THREE.AmbientLight(0x3a2800, 0.3));

    // Fluorescent lights every 4 units
    for(let z=2; z<200; z+=4) {
        const light = new THREE.PointLight(0xffe890, 0.8, 8);
        light.position.set(0, 1.6, -z);
        brScene.add(light);

        // Visible light fixture (flat box on ceiling)
        const fixtureGeo = new THREE.BoxGeometry(1.2, 0.06, 0.4);
        const fixtureMat = new THREE.MeshBasicMaterial({ color: 0xfffde0 });
        const fixture = new THREE.Mesh(fixtureGeo, fixtureMat);
        fixture.position.set(0, 1.71, -z);
        brScene.add(fixture);
    }
}

function renderBackrooms() {
    brAnimId = requestAnimationFrame(renderBackrooms);
    brT += 0.016;

    const bass = getBass();

    // Walk camera forward (slowly)
    const walkSpeed = 0.4 + bass * 0.3;
    brCamera.position.z -= walkSpeed * 0.016 * 60 * 0.016;
    if (brCamera.position.z < -190) brCamera.position.z = 0;

    // Subtle camera bob (walking feel)
    brCamera.position.y = Math.sin(brT * 2.2) * 0.06;
    brCamera.rotation.z = Math.sin(brT * 2.2) * 0.008;

    // Flicker lights with bass
    if (Math.random() < 0.015) {
        brScene.traverse(obj => {
            if (obj.isPointLight) obj.intensity = 0.2 + Math.random()*0.5;
        });
    } else {
        brScene.traverse(obj => {
            if (obj.isPointLight) obj.intensity = Math.min(obj.intensity + 0.08, 0.8 + bass*0.4);
        });
    }

    // Show lyrics
    SCRIPT.forEach(item => {
        if (brT >= item.t && !brShown.has(item.t)) {
            brShown.add(item.t);
            showLyric(item);
        }
    });

    brRenderer.render(brScene, brCamera);
}

function showLyric(item) {
    const el = document.getElementById('br-lyric');
    // Reset
    el.style.opacity='0';
    el.className='br-lyric';

    setTimeout(()=>{
        el.textContent = item.text;
        el.className = 'br-lyric ' + item.cls;
        el.style.color = item.col;
        if (item.x) { el.style.left=item.x; } else { el.style.left='50%'; }
        el.style.textShadow = `0 0 30px ${item.col}, 0 0 60px ${item.col}`;

        // Fade in
        el.style.transition='opacity 0.7s ease';
        requestAnimationFrame(()=>{ el.style.opacity='1'; });

        // Hold then fade out
        const hold = item.text.length < 4 ? 1800 : Math.min(item.text.length*130, 6000);
        setTimeout(()=>{
            el.style.opacity='0';
        }, hold);
    }, 50);
}

function exitBackrooms() {
    cancelAnimationFrame(brAnimId);
    audioEl.pause(); audioEl.currentTime=0;
    if(brRenderer) brRenderer.dispose();
    document.getElementById('backrooms-phase').style.display='none';
    document.getElementById('main-console').style.display='flex';
    out('<span style="color:#00ffcc;">&gt; Протокол завершён. Добро пожаловать обратно.</span>');
    consoleInput.focus();
}

window.addEventListener('resize', ()=>{
    if(pCanvas){ pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight; buildParticles(); buildBg(); }
    if(brCamera && brRenderer){
        brCamera.aspect=window.innerWidth/window.innerHeight;
        brCamera.updateProjectionMatrix();
        brRenderer.setSize(window.innerWidth, window.innerHeight);
    }
});
