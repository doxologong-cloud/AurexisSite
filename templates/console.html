<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AUREX OS TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; background:#000; color:#00ffcc; font-family:'Consolas',monospace; overflow:hidden; }

        /* ── TERMINAL ── */
        #main-console { display:flex; flex-direction:column; height:100vh; padding:20px; }
        .console-output { flex-grow:1; overflow-y:auto; display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:20px; font-size:1rem; line-height:1.6; }
        .console-input-row { display:flex; align-items:center; border-top:1px dashed #00ffcc33; padding-top:15px; }
        .console-input { flex-grow:1; background:transparent; border:none; color:#fff; font-family:'Consolas',monospace; font-size:1.2rem; outline:none; margin-left:10px; }

        /* ── DOX ROOM PHASE ── */
        #dox-phase {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:100;
        }
        #dox-three { position:absolute; top:0; left:0; width:100%; height:100%; }

        #loop-counter {
            position:absolute; top:20px; right:24px;
            font-family:'Consolas',monospace; color:rgba(0,255,204,0.25);
            font-size:0.75rem; letter-spacing:4px; z-index:20;
        }

        #petlya-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:clamp(4rem,13vw,11rem); font-weight:900; letter-spacing:12px;
            color:rgba(255,0,51,0); text-align:center; width:100%;
            text-shadow:0 0 80px red, 0 0 180px rgba(255,0,0,0.3);
            z-index:20; pointer-events:none;
            transition: color 1s;
        }

        #dox-scanlines {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 6px);
            z-index:19; pointer-events:none; opacity:0.45;
        }

        /* ── FLASH ── */
        #flash { position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:none; opacity:0; }

        /* ── BACKROOMS PHASE ── */
        #br-phase {
            display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:300; overflow:hidden;
        }
        #br-three { position:absolute; top:0; left:0; width:100%; height:100%; }

        /* Letterbox */
        #br-phase::before, #br-phase::after {
            content:''; position:absolute; left:0; width:100%; height:75px; background:#000; z-index:10;
        }
        #br-phase::before { top:0; }
        #br-phase::after  { bottom:0; }

        #br-lyric {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:20; text-align:center; pointer-events:none;
            opacity:0; transition:opacity 0.8s; white-space:pre-line; line-height:1.1;
        }
        #br-lyric.big {
            font-size:clamp(3rem,11vw,9rem); font-weight:900; letter-spacing:8px;
        }
        #br-lyric.med {
            font-size:clamp(1.5rem,4vw,3.2rem); font-weight:600; letter-spacing:5px;
        }
        #br-lyric.sm {
            font-size:clamp(0.9rem,2.5vw,1.6rem); letter-spacing:4px;
        }
        #br-vignette {
            position:absolute; inset:0;
            background:radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.82) 100%);
            z-index:8; pointer-events:none;
        }
        #br-scan {
            position:absolute; inset:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 6px);
            z-index:9; pointer-events:none; opacity:0.5;
        }
        #br-hint {
            position:absolute; bottom:85px; left:50%; transform:translateX(-50%);
            color:rgba(200,168,75,0.3); font-size:0.7rem; letter-spacing:3px; z-index:20;
            opacity:0; transition:opacity 2s;
        }

        @keyframes shake {
            0%,100%{ transform:translate(0); }
            25%{ transform:translate(-4px,2px); }
            50%{ transform:translate(4px,-2px); }
            75%{ transform:translate(-3px,3px); }
        }
        .shaking { animation:shake 0.08s infinite; }
    </style>
</head>
<body>

<div id="flash"></div>

<!-- DOX ROOM -->
<div id="dox-phase">
    <div id="dox-three"></div>
    <div id="dox-scanlines"></div>
    <div id="loop-counter"></div>
    <div id="petlya-text">ПЕТЛЯ</div>
</div>

<!-- BACKROOMS -->
<div id="br-phase">
    <div id="br-three"></div>
    <div id="br-vignette"></div>
    <div id="br-scan"></div>
    <div id="br-lyric" class="big"></div>
    <div id="br-hint">[ любая клавиша — выход ]</div>
</div>

<!-- TERMINAL -->
<div id="main-console">
    <div style="border-bottom:1px dashed #00ffcc22;padding-bottom:15px;margin-bottom:20px;opacity:0.5;font-size:0.85rem;">
        AUREX OS TERMINAL v2.5<br>
        <span style="color:#444">help</span> — команды &nbsp;·&nbsp; <span style="color:#ff003388">dox</span> — петля
    </div>
    <div id="console-output" class="console-output">
        <div style="color:#2e5a48;">&gt; Инициализация... <span style="color:#4caf50;">OK</span></div>
        <div style="color:#2e5a48;">&gt; Ожидание.</div>
    </div>
    <div class="console-input-row">
        <span style="color:#00ffcc;">root@vault:~#</span>
        <input type="text" id="console-input" class="console-input" autocomplete="off" autofocus>
    </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════
//  TERMINAL
// ════════════════════════════════════════════════
const ci = document.getElementById('console-input');
const co = document.getElementById('console-output');

ci.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const cmd = ci.value.trim(); ci.value = '';
    if (!cmd) return;
    const l = document.createElement('div');
    l.innerHTML = `<span style="color:#00ffcc;">root@vault:~#</span> <span style="color:#ddd;">${cmd}</span>`;
    co.appendChild(l);
    runCmd(cmd.toLowerCase());
    co.scrollTop = co.scrollHeight;
});

function out(html) {
    const d = document.createElement('div');
    d.style.color = '#4a7a6a'; d.innerHTML = html;
    co.appendChild(d); co.scrollTop = co.scrollHeight;
}

function runCmd(cmd) {
    if (cmd === 'help')    out('help · clear · history · <span style="color:#ff0033;font-weight:bold;">dox</span>');
    else if (cmd === 'clear') co.innerHTML = '';
    else if (cmd === 'history') out('[2021] Петля запущена.<br>[2024] Потеря связи.<br>[2026] Восстановлено.<br>[????] <span style="color:#ff0033">ПОВРЕЖДЕНО</span>');
    else if (cmd === 'dox') { out('<span style="color:#ff0033;">▶ ПРОТОКОЛ ДЕЖАВЮ</span>'); setTimeout(triggerDox, 900); }
    else out(`<span style="color:#333;">не найдено: ${cmd}</span>`);
}

// ════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════
const audioEl = new Audio('/static/assets/loop_music.m4a');
audioEl.loop = true;
let analyser, freqData;
function initAudio() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser(); analyser.fftSize = 256;
        ctx.createMediaElementSource(audioEl).connect(analyser);
        analyser.connect(ctx.destination);
        freqData = new Uint8Array(analyser.frequencyBinCount);
    } catch(e){}
}
function getBass() {
    if (analyser && freqData) {
        analyser.getByteFrequencyData(freqData);
        return (freqData[0]+freqData[1]+freqData[2]+freqData[3]) / 4 / 255;
    }
    return 0.1 + 0.07*Math.sin(Date.now()*0.0007);
}

// ════════════════════════════════════════════════
//  THREE.JS DOX ROOM SCENE
// ════════════════════════════════════════════════
let doxScene, doxCam, doxRenderer, doxAnimId;
let charRoot; // character THREE.Group

// Scene layout
const BED_POS   = new THREE.Vector3(-4.5, 0, 0.5);
const DESK_POS  = new THREE.Vector3( 4.2, 0, 0.5);
const CHAR_STAND_Y = 1.25; // hip height when feet on floor
const CHAR_BED_Y   = 1.05; // hip height when lying (above mattress)

// Loop state machine
let loopState  = 'lying';   // lying | rising | walking | sitting | pause_desk | flash
let stateT     = 0;         // 0..1 progress through current state
let stateStart = 0;         // performance.now() when state began
let loopCount  = 0;
let speedFactor= 1.0;       // multiplier, shrinks each loop (faster)

// Base durations (seconds)
const BASE_DUR = { lying:0.9, rising:1.4, walking:2.2, arriving:0.9, sitting:0.5, pause_desk:0.6 };
function getDur(s) { return BASE_DUR[s] * speedFactor; }

// Character parts (Three.Groups)
let hipGroup, torsoMesh, headMesh;
let lShPivot, rShPivot, lElPivot, rElPivot;
let lHipPivot, rHipPivot, lKneePivot, rKneePivot;
let charMat;

// Accumulated walk time (for leg cycle)
let walkTime = 0;

// Camera target (for zoom into monitor)
const CAM_NORMAL_POS = new THREE.Vector3(0, 6.5, 13);
const CAM_NORMAL_TGT = new THREE.Vector3(0, 2.0, 0);
const monitorWorldPos = new THREE.Vector3(DESK_POS.x, 1.85, DESK_POS.z - 0.6);
let camZooming = false;

function triggerDox() {
    document.getElementById('main-console').style.display = 'none';
    document.getElementById('dox-phase').style.display = 'block';
    initAudio();
    audioEl.play().catch(()=>{});
    setupDoxScene();
    loopCount = 0; speedFactor = 1.0;
    startState('lying');
    doxLoop();
}

function setupDoxScene() {
    const W = window.innerWidth, H = window.innerHeight;
    doxScene = new THREE.Scene();
    doxScene.background = new THREE.Color(0x050404);
    doxScene.fog = new THREE.Fog(0x050404, 18, 32);

    doxCam = new THREE.PerspectiveCamera(52, W/H, 0.1, 100);
    doxCam.position.copy(CAM_NORMAL_POS);
    doxCam.lookAt(CAM_NORMAL_TGT);

    doxRenderer = new THREE.WebGLRenderer({ antialias:true });
    doxRenderer.setSize(W, H);
    doxRenderer.shadowMap.enabled = true;
    doxRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('dox-three').appendChild(doxRenderer.domElement);

    buildRoom();
    buildFurniture();
    buildCharacter();
    buildDoxLights();
}

function buildRoom() {
    const floorM  = new THREE.MeshLambertMaterial({ color:0x1a1410 });
    const wallM   = new THREE.MeshLambertMaterial({ color:0x141008 });
    const ceilM   = new THREE.MeshLambertMaterial({ color:0x0e0c06 });

    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 14), floorM);
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
    doxScene.add(floor);
    // Ceiling
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(16, 14), ceilM);
    ceil.rotation.x = Math.PI/2; ceil.position.y = 6;
    doxScene.add(ceil);
    // Back wall
    const bw = new THREE.Mesh(new THREE.PlaneGeometry(16, 6), wallM);
    bw.position.set(0, 3, -6); doxScene.add(bw);
    // Left wall
    const lw = new THREE.Mesh(new THREE.PlaneGeometry(14, 6), wallM);
    lw.rotation.y = Math.PI/2; lw.position.set(-7.5, 3, 0); doxScene.add(lw);
    // Right wall
    const rw = new THREE.Mesh(new THREE.PlaneGeometry(14, 6), wallM);
    rw.rotation.y = -Math.PI/2; rw.position.set(7.5, 3, 0); doxScene.add(rw);
}

function buildFurniture() {
    const woodM = new THREE.MeshLambertMaterial({ color:0x3a2512 });
    const bedM  = new THREE.MeshLambertMaterial({ color:0x4a3520 });
    const sheetM= new THREE.MeshLambertMaterial({ color:0x2a2035 }); // dark sheets
    const pillowM=new THREE.MeshLambertMaterial({ color:0x3a3048 });
    const deskM = new THREE.MeshLambertMaterial({ color:0x1a1a1a });
    const legM  = new THREE.MeshLambertMaterial({ color:0x111111 });

    // ── BED ──
    const bx = BED_POS.x, bz = BED_POS.z;
    // Frame
    const bedFrame = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.5, 5.5), bedM);
    bedFrame.position.set(bx, 0.25, bz); bedFrame.castShadow=true; doxScene.add(bedFrame);
    // Headboard
    const headboard = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.2, 0.15), woodM);
    headboard.position.set(bx, 0.9, bz-2.75); doxScene.add(headboard);
    // Mattress
    const mattress = new THREE.Mesh(new THREE.BoxGeometry(2.9, 0.3, 5.1), bedM);
    mattress.position.set(bx, 0.65, bz); doxScene.add(mattress);
    // Sheets
    const sheets = new THREE.Mesh(new THREE.BoxGeometry(2.85, 0.15, 3.5), sheetM);
    sheets.position.set(bx, 0.87, bz+0.6); doxScene.add(sheets);
    // Pillow
    const pillow = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 0.9), pillowM);
    pillow.position.set(bx, 0.87, bz-2.0); doxScene.add(pillow);

    // ── DESK ──
    const dx = DESK_POS.x, dz = DESK_POS.z;
    // Tabletop
    const tabletop = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.08, 1.5), deskM);
    tabletop.position.set(dx, 1.52, dz-0.2); tabletop.castShadow=true; doxScene.add(tabletop);
    // Legs
    [[-1.6,-0.6],[-1.6,0.5],[1.6,-0.6],[1.6,0.5]].forEach(([lx,lz])=>{
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.07,1.52,0.07), legM);
        leg.position.set(dx+lx, 0.76, dz-0.2+lz); doxScene.add(leg);
    });

    // ── PC MONITOR ──
    const monBack = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.3, 0.12), deskM);
    monBack.position.set(dx, 2.22, dz-0.65);
    monBack.castShadow=true; doxScene.add(monBack);
    // Monitor screen (glowing)
    const screenM = new THREE.MeshBasicMaterial({ color:0x002a3a });
    const screen = new THREE.Mesh(new THREE.BoxGeometry(1.85, 1.15, 0.02), screenM);
    screen.position.set(dx, 2.22, dz-0.59); doxScene.add(screen);
    // Monitor glow light
    const monLight = new THREE.PointLight(0x006688, 1.5, 4);
    monLight.position.set(dx, 2.2, dz-0.4); doxScene.add(monLight);
    // Monitor stand
    const monNeck = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.35,0.08), legM);
    monNeck.position.set(dx, 1.75, dz-0.65); doxScene.add(monNeck);
    const monBase = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.04,0.4), deskM);
    monBase.position.set(dx, 1.58, dz-0.65); doxScene.add(monBase);

    // ── CHAIR ──
    const chairM = new THREE.MeshLambertMaterial({ color:0x0d0d0d });
    const seat = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 1.1), chairM);
    seat.position.set(dx-0.1, 1.1, dz+0.7); doxScene.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 0.1), chairM);
    back.position.set(dx-0.1, 1.65, dz+0.15); doxScene.add(back);
    [[-0.45,-0.45],[0.45,-0.45],[-0.45,0.45],[0.45,0.45]].forEach(([cx,cz])=>{
        const cl = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.1,6), chairM);
        cl.position.set(dx-0.1+cx, 0.55, dz+0.7+cz); doxScene.add(cl);
    });

    // ── BEDSIDE LAMP ──
    const lampBase = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.18,0.08,8), woodM);
    lampBase.position.set(bx+1.8, 0.04, bz-2.3); doxScene.add(lampBase);
    const lampPole = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.9,6), woodM);
    lampPole.position.set(bx+1.8, 0.5, bz-2.3); doxScene.add(lampPole);
    const lampShade = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.18,0.3,10), new THREE.MeshLambertMaterial({color:0x3a2a18, side:THREE.DoubleSide}));
    lampShade.position.set(bx+1.8, 0.95, bz-2.3); doxScene.add(lampShade);
    const lampGlow = new THREE.PointLight(0xff8833, 0.9, 4.5);
    lampGlow.position.set(bx+1.8, 0.85, bz-2.3); doxScene.add(lampGlow);

    // ── NIGHTSTAND ──
    const ns = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.5), woodM);
    ns.position.set(bx+1.8, 0.4, bz-2.3); doxScene.add(ns);
}

function buildDoxLights() {
    // Very dim ambient
    doxScene.add(new THREE.AmbientLight(0x1a0e06, 0.4));
    // Ceiling center light
    const ceil = new THREE.PointLight(0x886644, 0.6, 14);
    ceil.position.set(0, 5.5, 0); doxScene.add(ceil);
}

function buildCharacter() {
    charMat = new THREE.MeshPhongMaterial({ color:0x00ffcc, emissive:0x003322, shininess:90 });
    const C = (rt, rb, h) => new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,10), charMat);
    const S = (r) => new THREE.Mesh(new THREE.SphereGeometry(r,10,8), charMat);

    charRoot = new THREE.Group();
    doxScene.add(charRoot);

    // charRoot.position = hip position
    // Hip group rotates to lie down
    hipGroup = new THREE.Group();
    charRoot.add(hipGroup);

    // Torso (going UP from hip)
    torsoMesh = C(0.16, 0.19, 0.85);
    torsoMesh.position.y = 0.425;
    torsoMesh.castShadow = true;
    hipGroup.add(torsoMesh);

    // Neck
    const neck = C(0.1, 0.12, 0.22);
    neck.position.y = 0.96;
    hipGroup.add(neck);

    // Head
    headMesh = S(0.22);
    headMesh.position.y = 1.18;
    headMesh.castShadow = true;
    hipGroup.add(headMesh);

    // ── LEFT ARM ──
    lShPivot = new THREE.Group();
    lShPivot.position.set(-0.28, 0.8, 0);
    hipGroup.add(lShPivot);

    const lUA = C(0.07, 0.08, 0.52);
    lUA.position.y = -0.26;
    lShPivot.add(lUA);

    lElPivot = new THREE.Group();
    lElPivot.position.y = -0.52;
    lShPivot.add(lElPivot);

    const lFA = C(0.055, 0.065, 0.44);
    lFA.position.y = -0.22;
    lElPivot.add(lFA);

    // ── RIGHT ARM ──
    rShPivot = new THREE.Group();
    rShPivot.position.set(0.28, 0.8, 0);
    hipGroup.add(rShPivot);

    const rUA = C(0.07, 0.08, 0.52);
    rUA.position.y = -0.26;
    rShPivot.add(rUA);

    rElPivot = new THREE.Group();
    rElPivot.position.y = -0.52;
    rShPivot.add(rElPivot);

    const rFA = C(0.055, 0.065, 0.44);
    rFA.position.y = -0.22;
    rElPivot.add(rFA);

    // ── LEFT LEG ──
    lHipPivot = new THREE.Group();
    lHipPivot.position.set(-0.14, 0, 0);
    hipGroup.add(lHipPivot);

    const lTh = C(0.10, 0.12, 0.65);
    lTh.position.y = -0.325;
    lHipPivot.add(lTh);

    lKneePivot = new THREE.Group();
    lKneePivot.position.y = -0.65;
    lHipPivot.add(lKneePivot);

    const lSh = C(0.075, 0.095, 0.60);
    lSh.position.y = -0.30;
    lKneePivot.add(lSh);

    // foot
    const lFt = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.1,0.32), charMat);
    lFt.position.set(-0.02,-0.62,0.06);
    lKneePivot.add(lFt);

    // ── RIGHT LEG ──
    rHipPivot = new THREE.Group();
    rHipPivot.position.set(0.14, 0, 0);
    hipGroup.add(rHipPivot);

    const rTh = C(0.10, 0.12, 0.65);
    rTh.position.y = -0.325;
    rHipPivot.add(rTh);

    rKneePivot = new THREE.Group();
    rKneePivot.position.y = -0.65;
    rHipPivot.add(rKneePivot);

    const rSh = C(0.075, 0.095, 0.60);
    rSh.position.y = -0.30;
    rKneePivot.add(rSh);

    const rFt = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.1,0.32), charMat);
    rFt.position.set(0.02,-0.62,0.06);
    rKneePivot.add(rFt);

    // Character glow
    const glow = new THREE.PointLight(0x00ffcc, 0.6, 2.5);
    hipGroup.add(glow);

    // Start lying on bed
    charRoot.position.set(BED_POS.x, CHAR_BED_Y, BED_POS.z - 1.0);
    charRoot.rotation.y = 0; // facing -Z (along bed length)
    poseLying();
}

// ── POSE FUNCTIONS ──
function poseLying() {
    hipGroup.rotation.x = Math.PI/2; // rotate so body is horizontal
    lHipPivot.rotation.x = 0; rHipPivot.rotation.x = 0;
    lKneePivot.rotation.x = 0; rKneePivot.rotation.x = 0;
    lShPivot.rotation.x = 0;  rShPivot.rotation.x = 0;
    lElPivot.rotation.x = 0;  rElPivot.rotation.x = 0;
}

function poseStanding() {
    hipGroup.rotation.x = 0;
    lHipPivot.rotation.x = 0; rHipPivot.rotation.x = 0;
    lKneePivot.rotation.x = 0; rKneePivot.rotation.x = 0;
    lShPivot.rotation.x = 0;  rShPivot.rotation.x = 0;
    lElPivot.rotation.x = 0;  rElPivot.rotation.x = 0;
}

function poseSitting() {
    hipGroup.rotation.x = 0;
    lHipPivot.rotation.x = -Math.PI*0.48; rHipPivot.rotation.x = -Math.PI*0.48;
    lKneePivot.rotation.x =  Math.PI*0.52; rKneePivot.rotation.x =  Math.PI*0.52;
    lShPivot.rotation.x = -0.5; rShPivot.rotation.x = -0.5;
    lElPivot.rotation.x = 0.3;  rElPivot.rotation.x = 0.3;
}

function applyWalk(t) {
    const freq = 2.4; // steps per second
    const cyc = t * freq * Math.PI * 2;
    const amp = 0.55;
    const armAmp = 0.35;

    lHipPivot.rotation.x  =  Math.sin(cyc) * amp;
    rHipPivot.rotation.x  = -Math.sin(cyc) * amp;
    lKneePivot.rotation.x = Math.max(0, -Math.sin(cyc)) * 0.6;
    rKneePivot.rotation.x = Math.max(0,  Math.sin(cyc)) * 0.6;
    lShPivot.rotation.x   = -Math.sin(cyc) * armAmp;
    rShPivot.rotation.x   =  Math.sin(cyc) * armAmp;
    lElPivot.rotation.x   = Math.max(0, Math.sin(cyc)) * 0.4;
    rElPivot.rotation.x   = Math.max(0,-Math.sin(cyc)) * 0.4;

    // Torso slight forward lean
    hipGroup.rotation.x = -0.08;

    // Bob
    charRoot.position.y = CHAR_STAND_Y + Math.abs(Math.sin(cyc*0.5))*0.05;
}

function lerp(a, b, t) { return a + (b-a) * Math.min(Math.max(t,0),1); }
function clamp(v,a,b) { return Math.min(Math.max(v,a),b); }

// ── STATE MACHINE ──
function startState(s) {
    loopState = s; stateStart = performance.now()/1000; stateT = 0;
    if (s === 'lying') {
        charRoot.position.set(BED_POS.x, CHAR_BED_Y, BED_POS.z - 1.0);
        charRoot.rotation.y = 0;
        poseLying();
    }
    if (s === 'walking') {
        charRoot.rotation.y = -Math.PI/2; // face +X
        walkTime = 0;
    }
    if (s === 'sitting') {
        charRoot.position.set(DESK_POS.x - 0.1, CHAR_STAND_Y, DESK_POS.z + 0.85);
        charRoot.rotation.y = Math.PI; // face monitor (-Z)
    }
}

function updateState(now) {
    const elapsed = now/1000 - stateStart;
    const dur = getDur(loopState) || 0.5;
    stateT = clamp(elapsed / dur, 0, 1);

    if (loopState === 'lying') {
        poseLying();
        if (stateT >= 1) startState('rising');
    }
    else if (loopState === 'rising') {
        // Rotate from lying to standing, move to floor
        hipGroup.rotation.x = lerp(Math.PI/2, 0, stateT);
        const fromPos = new THREE.Vector3(BED_POS.x, CHAR_BED_Y, BED_POS.z-1.0);
        const toPos   = new THREE.Vector3(BED_POS.x+1.5, CHAR_STAND_Y, BED_POS.z);
        charRoot.position.lerpVectors(fromPos, toPos, stateT);
        charRoot.rotation.y = lerp(0, -Math.PI/2, stateT);
        // Reset limbs to standing as we rise
        lHipPivot.rotation.x = lerp(0, 0, stateT);
        rHipPivot.rotation.x = 0;
        if (stateT >= 1) startState('walking');
    }
    else if (loopState === 'walking') {
        walkTime += 0.016;
        const fromX = BED_POS.x + 1.5;
        const toX   = DESK_POS.x - 0.4;
        charRoot.position.x = lerp(fromX, toX, stateT);
        charRoot.position.z = BED_POS.z;
        charRoot.position.y = CHAR_STAND_Y;
        charRoot.rotation.y = -Math.PI/2;
        applyWalk(walkTime);
        if (stateT >= 1) startState('arriving');
    }
    else if (loopState === 'arriving') {
        // Walk to chair and start sitting
        const fromPos = new THREE.Vector3(DESK_POS.x-0.4, CHAR_STAND_Y, BED_POS.z);
        const toPos   = new THREE.Vector3(DESK_POS.x-0.1, CHAR_STAND_Y, DESK_POS.z+0.85);
        charRoot.position.lerpVectors(fromPos, toPos, stateT);
        // Turn to face monitor
        charRoot.rotation.y = lerp(-Math.PI/2, Math.PI, stateT);
        // Start bending knees
        lHipPivot.rotation.x  = lerp(0, -Math.PI*0.48, stateT);
        rHipPivot.rotation.x  = lerp(0, -Math.PI*0.48, stateT);
        lKneePivot.rotation.x = lerp(0,  Math.PI*0.52, stateT);
        rKneePivot.rotation.x = lerp(0,  Math.PI*0.52, stateT);
        lShPivot.rotation.x   = lerp(0, -0.5, stateT);
        rShPivot.rotation.x   = lerp(0, -0.5, stateT);
        hipGroup.rotation.x   = lerp(0, 0, stateT);
        if (stateT >= 1) startState('sitting');
    }
    else if (loopState === 'sitting') {
        poseSitting();
        if (stateT >= 1) startState('pause_desk');
    }
    else if (loopState === 'pause_desk') {
        poseSitting();
        if (stateT >= 1) endLoop();
    }
}

function endLoop() {
    loopCount++;
    speedFactor *= 0.72; // each loop is 28% faster
    speedFactor = Math.max(speedFactor, 0.08);

    document.getElementById('loop-counter').textContent = `LOOP ${loopCount}`;

    // Update character color toward red
    const r = Math.min(1.0, loopCount * 0.15);
    const g = Math.max(0, 1.0 - r * 1.3);
    charMat.color.setRGB(r + (1-r)*0, g + (1-g)*1*(1-r), (1-r));
    charMat.emissive.setRGB(r*0.4, g*0.15, (1-r)*0.2);

    const petlya = document.getElementById('petlya-text');
    if (loopCount >= 4) {
        const op = clamp((loopCount - 4) / 4, 0, 1);
        petlya.style.color = `rgba(255,0,51,${op})`;
    }

    // Camera shake intensifies
    if (loopCount >= 3) {
        document.getElementById('dox-phase').classList.add('shaking');
    }

    // After 8 loops, zoom into monitor
    if (loopCount >= 8) {
        camZooming = true;
        setTimeout(doMonitorZoom, 500);
        return;
    }

    startState('lying');
}

function doMonitorZoom() {
    // Animate camera into PC monitor over 2.5s
    const start = performance.now();
    const duration = 2500;
    const startPos = doxCam.position.clone();

    function animZoom() {
        const t = clamp((performance.now()-start)/duration, 0, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // smooth

        doxCam.position.lerpVectors(startPos, monitorWorldPos, ease);
        doxCam.lookAt(monitorWorldPos);

        if (t < 1) { requestAnimationFrame(animZoom); }
        else { doFlashToBR(); }
    }
    animZoom();
}

function doFlashToBR() {
    const fl = document.getElementById('flash');
    fl.style.display='block'; fl.style.opacity='0'; fl.style.transition='opacity 0.35s';
    requestAnimationFrame(()=>{
        fl.style.opacity='1';
        setTimeout(()=>{
            cancelAnimationFrame(doxAnimId);
            doxRenderer.dispose();
            document.getElementById('dox-phase').style.display='none';
            fl.style.opacity='0';
            setTimeout(()=>{ fl.style.display='none'; startBackrooms(); }, 400);
        }, 500);
    });
}

let doxLastTime = 0;
function doxLoop(ts=0) {
    doxAnimId = requestAnimationFrame(doxLoop);
    const dt = ts - doxLastTime; doxLastTime = ts;

    if (!camZooming) {
        // Subtle camera breathe
        const breath = Math.sin(ts*0.0004)*0.08;
        doxCam.position.y = CAM_NORMAL_POS.y + breath;
        doxCam.lookAt(CAM_NORMAL_TGT);

        updateState(ts);
    }

    doxRenderer.render(doxScene, doxCam);
}

function startBackrooms() {
    document.getElementById('br-phase').style.display='block';
    const W=window.innerWidth, H=window.innerHeight;
    brScene = new THREE.Scene();
    brScene.fog = new THREE.FogExp2(0x1a1100, 0.028);
    brScene.background = new THREE.Color(0x0e0b00);
    brCam = new THREE.PerspectiveCamera(72, W/H, 0.1, 200);
    brCam.position.set(0,0,0);
    brRenderer = new THREE.WebGLRenderer({antialias:true});
    brRenderer.setSize(W,H);
    document.getElementById('br-three').appendChild(brRenderer.domElement);
    buildBRCorridor(); buildBRLights();
    document.addEventListener('keydown', exitBR, {once:true});
    setTimeout(()=>{ document.getElementById('br-hint').style.opacity='1'; }, 28000);
    brT=0; renderBR();
}

function buildBRCorridor() {
    const CW=5.5, CH=3.8, CL=220;
    const wallM = new THREE.MeshLambertMaterial({color:0xb89828, side:THREE.BackSide});
    const box = new THREE.Mesh(new THREE.BoxGeometry(CW,CH,CL), wallM);
    box.position.set(0,0,-CL/2); brScene.add(box);

    const floorM = new THREE.MeshLambertMaterial({color:0x7a6010});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(CW,CL), floorM);
    floor.rotation.x=-Math.PI/2; floor.position.set(0,-CH/2,-CL/2); brScene.add(floor);

    // Ceiling tiles grid
    const gridM = new THREE.LineBasicMaterial({color:0x907820, transparent:true, opacity:0.25});
    for(let z=0;z<CL;z+=1.5){
        const g=new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-CW/2,CH/2-0.01,-z),
            new THREE.Vector3( CW/2,CH/2-0.01,-z)]);
        brScene.add(new THREE.Line(g,gridM));
    }
    for(let x=-CW/2;x<=CW/2;x+=1.5){
        const g=new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(x,CH/2-0.01,0),
            new THREE.Vector3(x,CH/2-0.01,-CL)]);
        brScene.add(new THREE.Line(g,gridM));
    }
    // Floor tiles
    const floorLineM=new THREE.LineBasicMaterial({color:0x5a4808,transparent:true,opacity:0.2});
    for(let z=0;z<CL;z+=1.5){
        const g=new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-CW/2,-CH/2+0.01,-z),
            new THREE.Vector3( CW/2,-CH/2+0.01,-z)]);
        brScene.add(new THREE.Line(g,floorLineM));
    }
    // Wall seam lines
    const wallLineM=new THREE.LineBasicMaterial({color:0xa07818,transparent:true,opacity:0.18});
    for(let z=0;z<CL;z+=3){
        [-CW/2+0.01, CW/2-0.01].forEach(x=>{
            const g=new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(x,-CH/2,-z),
                new THREE.Vector3(x, CH/2,-z)]);
            brScene.add(new THREE.Line(g,wallLineM));
        });
    }
}

function buildBRLights() {
    brScene.add(new THREE.AmbientLight(0x3a2600,0.35));
    for(let z=2;z<220;z+=4){
        const l=new THREE.PointLight(0xffe080,0.9,9);
        l.position.set(0,1.7,-z); brScene.add(l);
        const fix=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.05,0.5),
            new THREE.MeshBasicMaterial({color:0xfffce0}));
        fix.position.set(0,1.88,-z); brScene.add(fix);
    }
}

function renderBR() {
    brAnimId=requestAnimationFrame(renderBR);
    brT+=0.016;
    const bass=getBass();

    // Walk forward
    brCam.position.z-=0.45*0.016*60*0.016;
    if(brCam.position.z<-210) brCam.position.z=0;
    brCam.position.y=Math.sin(brT*2.2)*0.06;
    brCam.rotation.z=Math.sin(brT*2.2)*0.007;

    // Flicker
    if(Math.random()<0.02){
        brScene.traverse(o=>{if(o.isPointLight)o.intensity=0.15+Math.random()*0.4;});
    } else {
        brScene.traverse(o=>{if(o.isPointLight)o.intensity=Math.min(o.intensity+0.07, 0.9+bass*0.5);});
    }

    SCRIPT.forEach(item=>{
        if(brT>=item.t && !brShown.has(item.t)){
            brShown.add(item.t); showLyric(item);
        }
    });

    brRenderer.render(brScene,brCam);
}

function showLyric(item){
    const el=document.getElementById('br-lyric');
    el.style.opacity='0';
    setTimeout(()=>{
        el.textContent=item.text;
        el.className='br-lyric '+item.cls;
        el.style.color=item.col;
        el.style.textShadow=`0 0 40px ${item.col}, 0 0 80px ${item.col}`;
        el.style.left=item.x||'50%';
        el.style.transition='opacity 0.7s';
        requestAnimationFrame(()=>{ el.style.opacity='1'; });
        const hold=item.text.length<4?1800:Math.min(item.text.length*130,6500);
        setTimeout(()=>{ el.style.opacity='0'; }, hold);
    },60);
}

function exitBR(){
    cancelAnimationFrame(brAnimId);
    audioEl.pause(); audioEl.currentTime=0;
    if(brRenderer) brRenderer.dispose();
    document.getElementById('br-phase').style.display='none';
    document.getElementById('main-console').style.display='flex';
    out('<span style="color:#00ffcc;">&gt; Протокол завершён. Добро пожаловать обратно.</span>');
    ci.focus();
}

window.addEventListener('resize',()=>{
    if(doxCam&&doxRenderer){
        doxCam.aspect=window.innerWidth/window.innerHeight;
        doxCam.updateProjectionMatrix();
        doxRenderer.setSize(window.innerWidth,window.innerHeight);
    }
    if(brCam&&brRenderer){
        brCam.aspect=window.innerWidth/window.innerHeight;
        brCam.updateProjectionMatrix();
        brRenderer.setSize(window.innerWidth,window.innerHeight);
    }
});
