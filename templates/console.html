<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AUREX OS TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; background:#000; color:#00ffcc; font-family:'Consolas',monospace; overflow:hidden; }

        /* ── TERMINAL ── */
        #main-console { display:flex; flex-direction:column; height:100vh; padding:20px; }
        .console-output { flex-grow:1; overflow-y:auto; display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:20px; font-size:1rem; line-height:1.6; text-shadow: 0 0 5px #00ffcc; }
        .console-input-row { display:flex; align-items:center; border-top:1px dashed #00ffcc33; padding-top:15px; }
        .console-input { flex-grow:1; background:transparent; border:none; color:#fff; font-family:'Consolas',monospace; font-size:1.2rem; outline:none; margin-left:10px; text-shadow: 0 0 5px #fff; }

        /* ── DOX ROOM PHASE ── */
        #dox-phase {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:100;
            background: #000;
        }
        #dox-three { position:absolute; top:0; left:0; width:100%; height:100%; filter: contrast(1.2) saturate(1.5) brightness(0.9); }

        #loop-counter {
            position:absolute; top:20px; right:24px;
            font-family:'Consolas',monospace; color:rgba(255,0,51,0.5);
            font-size:0.85rem; letter-spacing:6px; z-index:20;
            text-shadow: 2px 0 0 rgba(0,255,204,0.5), -2px 0 0 rgba(255,0,51,0.5);
            animation: glitch-text 0.2s infinite;
        }

        #petlya-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:clamp(4rem,15vw,13rem); font-weight:900; letter-spacing:20px;
            color:rgba(255,0,51,0); text-align:center; width:100%;
            text-shadow:0 0 80px red, 0 0 180px rgba(255,0,0,0.3);
            z-index:20; pointer-events:none;
            transition: color 0.5s;
        }

        /* ── VHS / HORROR EFFECTS ── */
        #vhs-overlay {
            position:absolute; inset:0; z-index:19; pointer-events:none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            opacity: 0.6;
        }
        
        #vhs-tracking {
            position:absolute; bottom:10%; left:0; width:100%; height:10vh;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 10px rgba(255,255,255,0.05);
            z-index:19; pointer-events:none;
            animation: tracking 3s infinite linear;
        }

        /* ── FLASH ── */
        #flash { position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:none; opacity:0; }

        /* ── BACKROOMS PHASE ── */
        #br-phase {
            display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:300; overflow:hidden;
        }
        #br-three { position:absolute; top:0; left:0; width:100%; height:100%; filter: sepia(0.3) contrast(1.4) brightness(0.8); }

        #br-phase::before, #br-phase::after {
            content:''; position:absolute; left:0; width:100%; height:10vh; background:#000; z-index:10;
            box-shadow: 0 0 30px #000;
        }
        #br-phase::before { top:0; }
        #br-phase::after  { bottom:0; }

        #br-lyric {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:20; text-align:center; pointer-events:none;
            opacity:0; transition:opacity 0.5s; white-space:pre-line; line-height:1.1;
        }
        #br-lyric.big { font-size:clamp(4rem,12vw,10rem); font-weight:900; letter-spacing:10px; }
        #br-lyric.med { font-size:clamp(2rem,5vw,4rem); font-weight:700; letter-spacing:6px; }
        #br-lyric.sm { font-size:clamp(1rem,3vw,2rem); letter-spacing:4px; opacity:0.7; }
        
        #br-vignette {
            position:absolute; inset:0;
            background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.95) 100%);
            z-index:8; pointer-events:none;
        }

        @keyframes shake {
            0%,100%{ transform:translate(0); }
            20%{ transform:translate(-5px,3px) rotate(-0.5deg); filter: hue-rotate(90deg); }
            40%{ transform:translate(5px,-3px) rotate(0.5deg); }
            60%{ transform:translate(-3px,-3px); filter: hue-rotate(-90deg); }
            80%{ transform:translate(3px,3px); }
        }
        @keyframes tracking {
            0% { transform: translateY(-100vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        @keyframes glitch-text {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -2px); }
        }
        .shaking { animation:shake 0.15s infinite; }
        
        /* Chromatic Aberration wrapper for Three.js canvas */
        .chromatic {
            animation: chromAb 0.1s infinite;
        }
        @keyframes chromAb {
            0% { filter: drop-shadow(3px 0 0 rgba(255,0,0,0.4)) drop-shadow(-3px 0 0 rgba(0,255,255,0.4)); }
            50% { filter: drop-shadow(-3px 0 0 rgba(255,0,0,0.4)) drop-shadow(3px 0 0 rgba(0,255,255,0.4)); }
            100% { filter: drop-shadow(3px 0 0 rgba(255,0,0,0.4)) drop-shadow(-3px 0 0 rgba(0,255,255,0.4)); }
        }

    </style>
</head>
<body>

<div id="flash"></div>

<!-- DOX ROOM -->
<div id="dox-phase">
    <div id="dox-three" class="chromatic"></div>
    <div id="vhs-overlay"></div>
    <div id="vhs-tracking"></div>
    <div id="loop-counter">LOOP 0</div>
    <div id="petlya-text">ПЕТЛЯ</div>
</div>

<!-- FAKE DESKTOP -->
<div id="desktop-phase" style="display:none; position:fixed; inset:0; z-index:300; background:#111; font-family:sans-serif; overflow:hidden;">
    <div style="position:absolute; inset:0; background:radial-gradient(circle, #333, #000); opacity:0.5;"></div>
    <div style="position:absolute; top:40px; left:40px; text-align:center; cursor:pointer;" id="fake-icon">
        <i class="fa-solid fa-gamepad" style="font-size:64px; color:#ff0033; filter:drop-shadow(0 0 10px #ff0033);"></i>
        <div style="color:#fff; text-shadow:1px 1px 2px #000; font-size:16px; margin-top:10px; font-weight:bold;">LOOP.exe</div>
    </div>
    <div id="fake-mouse" style="position:absolute; top:80%; left:80%; width:24px; height:36px; background:url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'white\' stroke=\'black\' stroke-width=\'1\'><path d=\'M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z\'/></svg>') no-repeat; z-index:310; transition: top 2s ease-in-out, left 2s ease-in-out;"></div>
</div>

<!-- FMV GAME -->
<div id="fmv-phase" style="display:none; position:fixed; inset:0; z-index:400; background:#000;">
    <video id="bg-video" src="/static/assets/bg_dance.mp4" loop muted playsinline style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.6; filter: saturate(1.2) contrast(1.5) hue-rotate(-20deg);"></video>
    <div id="vhs-overlay" style="z-index:410;"></div>
    <div id="vhs-tracking" style="z-index:410;"></div>
    
    <!-- Placeholder for user video (Point Cloud / Mask) -->
    <canvas id="fmv-canvas" style="position:absolute; inset:0; width:100%; height:100%; z-index:420;"></canvas>
    
    <div id="fmv-lyric" style="position:absolute; bottom:10%; left:50%; transform:translateX(-50%); font-family:'Consolas',monospace; color:#fff; font-size:3rem; font-weight:bold; z-index:430; text-shadow: 3px 3px 0px #f00, -3px -3px 0px #0ff; opacity:0; transition: opacity 0.2s;"></div>
</div>
<!-- TERMINAL -->
<div id="main-console">
    <div style="border-bottom:1px dashed #00ffcc22;padding-bottom:15px;margin-bottom:20px;opacity:0.5;font-size:0.85rem;">
        AUREX OS TERMINAL v2.5<br>
        <span style="color:#ff003388; text-shadow: 0 0 10px red;">[ CRITICAL WARNING: MEMORY CORRUPTION DETECTED ]</span><br>
        type <span style="color:#fff">help</span> or <span style="color:#ff0033;font-weight:bold;">dox</span>
    </div>
    <div id="console-output" class="console-output">
        <div style="color:#2e5a48;">&gt; Ожидание ввода.</div>
    </div>
    <div class="console-input-row">
        <span style="color:#00ffcc;">root@vault:~#</span>
        <input type="text" id="console-input" class="console-input" autocomplete="off" autofocus>
    </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════
//  TERMINAL
// ════════════════════════════════════════════════
const ci = document.getElementById('console-input');
const co = document.getElementById('console-output');

ci.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const cmd = ci.value.trim(); ci.value = '';
    if (!cmd) return;
    const l = document.createElement('div');
    l.innerHTML = `<span style="color:#00ffcc;">root@vault:~#</span> <span style="color:#ddd;">${cmd}</span>`;
    co.appendChild(l);
    runCmd(cmd.toLowerCase());
    co.scrollTop = co.scrollHeight;
});

function out(html) {
    const d = document.createElement('div');
    d.style.color = '#4a7a6a'; d.innerHTML = html;
    co.appendChild(d); co.scrollTop = co.scrollHeight;
}

function runCmd(cmd) {
    if (cmd === 'dox') { 
        out('<span style="color:#ff0033; font-weight:900; letter-spacing:2px;">▶ ИНИЦИАЛИЗАЦИЯ ПЕТЛИ...</span>'); 
        setTimeout(triggerDox, 800); 
    }
    else out(`<span style="color:#333;">не найдено: ${cmd}</span>`);
}

// ════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════
const audioEl = new Audio('/static/assets/loop_music.m4a');
audioEl.loop = true;
let analyser, freqData;
function initAudio() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser(); analyser.fftSize = 256;
        ctx.createMediaElementSource(audioEl).connect(analyser);
        analyser.connect(ctx.destination);
        freqData = new Uint8Array(analyser.frequencyBinCount);
    } catch(e){}
}
function getBass() {
    if (analyser && freqData) {
        analyser.getByteFrequencyData(freqData);
        return (freqData[0]+freqData[1]+freqData[2]+freqData[3]) / 4 / 255;
    }
    return Math.random() * 0.2;
}

// ════════════════════════════════════════════════
//  THREE.JS DOX ROOM SCENE
// ════════════════════════════════════════════════
let doxScene, doxCam, doxRenderer, doxAnimId;
let charRoot; 

const BED_POS   = new THREE.Vector3(-4.5, 0, 0.5);
const DESK_POS  = new THREE.Vector3( 4.2, 0, 0.5);
const CHAR_STAND_Y = 1.35; 
const CHAR_BED_Y   = 1.15; 

let loopState  = 'lying';   
let stateT     = 0;         
let stateStart = 0;         
let loopCount  = 0;
let speedFactor= 1.0;       

const BASE_DUR = { lying:0.8, rising:1.2, walking:2.0, arriving:0.8, sitting:0.5, pause_desk:0.5 };
function getDur(s) { return BASE_DUR[s] * speedFactor; }

let hipGroup, torsoMesh, headMesh;
let lShPivot, rShPivot, lElPivot, rElPivot;
let lHipPivot, rHipPivot, lKneePivot, rKneePivot;
let charMat;
let walkTime = 0;

const CAM_NORMAL_POS = new THREE.Vector3(-1, 6.5, 12);
const CAM_NORMAL_TGT = new THREE.Vector3(0, 1.5, 0);
const monitorWorldPos = new THREE.Vector3(DESK_POS.x, 2.2, DESK_POS.z - 0.5);
let camZooming = false;
let roomLights = [];

function triggerDox() {
    document.getElementById('main-console').style.display = 'none';
    document.getElementById('dox-phase').style.display = 'block';
    initAudio();
    audioEl.play().catch(()=>{});
    setupDoxScene();
    loopCount = 0; speedFactor = 1.0;
    startState('lying');
    doxLoop();
}

function setupDoxScene() {
    const W = window.innerWidth, H = window.innerHeight;
    doxScene = new THREE.Scene();
    doxScene.background = new THREE.Color(0x020101);
    doxScene.fog = new THREE.FogExp2(0x020101, 0.08); // Dense horror fog

    doxCam = new THREE.PerspectiveCamera(60, W/H, 0.1, 100);
    // Initial position looking down at bed
    doxCam.position.set(BED_POS.x - 3, 4, BED_POS.z + 4);
    doxCam.lookAt(new THREE.Vector3(BED_POS.x, CHAR_BED_Y, BED_POS.z));

    doxRenderer = new THREE.WebGLRenderer({ antialias:false, powerPreference: "high-performance" });
    doxRenderer.setSize(W, H);
    doxRenderer.shadowMap.enabled = true;
    doxRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('dox-three').appendChild(doxRenderer.domElement);

    buildRoom();
    buildFurniture();
    buildCharacter();
    buildDoxLights();
}

function buildRoom() {
    const floorM  = new THREE.MeshStandardMaterial({ color:0x111111, roughness: 0.9, metalness: 0.1 });
    const wallM   = new THREE.MeshStandardMaterial({ color:0x0a0a0a, roughness: 1.0 });

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), floorM);
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
    doxScene.add(floor);
    
    const bw = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), wallM);
    bw.position.set(0, 5, -8); bw.receiveShadow = true; doxScene.add(bw);
}

function buildFurniture() {
    const bedM = new THREE.MeshStandardMaterial({ color:0x151515, roughness:0.8 });
    const deskM = new THREE.MeshStandardMaterial({ color:0x050505, roughness:0.5 });
    const clothM = new THREE.MeshStandardMaterial({ color:0x080808, roughness:1.0 }); // Dark blanket/pillow
    
    const bx = BED_POS.x, bz = BED_POS.z;
    const bed = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.8, 5.5), bedM);
    bed.position.set(bx, 0.4, bz); bed.castShadow=true; bed.receiveShadow=true; doxScene.add(bed);

    // Blanket
    const blanket = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.1, 3.5), clothM);
    blanket.position.set(bx, 0.85, bz + 1.0); 
    blanket.rotation.z = 0.05;
    blanket.castShadow=true; blanket.receiveShadow=true; doxScene.add(blanket);

    // Pillow
    const pillow = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 0.8), clothM);
    pillow.position.set(bx, 0.9, bz - 2.0); 
    pillow.rotation.y = 0.1;
    pillow.castShadow=true; pillow.receiveShadow=true; doxScene.add(pillow);

    const dx = DESK_POS.x, dz = DESK_POS.z;
    const desk = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.0), deskM);
    desk.position.set(dx, 1.5, dz); desk.castShadow=true; desk.receiveShadow=true; doxScene.add(desk);
    
    // Monitor screen (Bright red glow for horror)
    const screen = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.2, 0.05), new THREE.MeshBasicMaterial({ color:0xff0022 }));
    screen.position.set(dx, 2.2, dz-0.6); doxScene.add(screen);
    
    // Monitor hard light
    const monLight = new THREE.SpotLight(0xff0022, 5, 20, Math.PI/3, 0.5, 1.5);
    monLight.position.set(dx, 2.2, dz-0.5);
    monLight.target.position.set(dx, 1.0, dz+5);
    monLight.castShadow = true;
    monLight.shadow.mapSize.width = 1024;
    monLight.shadow.mapSize.height = 1024;
    doxScene.add(monLight);
    doxScene.add(monLight.target);
    roomLights.push(monLight);
}

function buildDoxLights() {
    doxScene.add(new THREE.AmbientLight(0x050505)); // pitch black almost
    
    // Flickering overhead light
    const ceil = new THREE.PointLight(0x4466aa, 1.0, 15);
    ceil.position.set(0, 6, 0);
    ceil.castShadow = true;
    doxScene.add(ceil);
    roomLights.push(ceil);
}

function buildCharacter() {
    // Pure black void material
    charMat = new THREE.MeshBasicMaterial({ color:0x000000 });
    const C = (rt, rb, h) => {
        const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,8), charMat);
        m.castShadow = true; m.receiveShadow = true; return m;
    };
    const S = (r) => {
        const m = new THREE.Mesh(new THREE.SphereGeometry(r,8,8), charMat);
        m.castShadow = true; return m;
    };

    charRoot = new THREE.Group();
    doxScene.add(charRoot);
    hipGroup = new THREE.Group();
    charRoot.add(hipGroup);

    torsoMesh = C(0.2, 0.15, 0.9);
    torsoMesh.position.y = 0.45;
    hipGroup.add(torsoMesh);

    headMesh = S(0.25);
    headMesh.position.y = 1.1;
    hipGroup.add(headMesh);

    // Left Arm
    lShPivot = new THREE.Group(); lShPivot.position.set(-0.3, 0.8, 0); hipGroup.add(lShPivot);
    const lUA = C(0.08, 0.06, 0.5); lUA.position.y = -0.25; lShPivot.add(lUA);
    lElPivot = new THREE.Group(); lElPivot.position.y = -0.5; lShPivot.add(lElPivot);
    const lFA = C(0.06, 0.04, 0.5); lFA.position.y = -0.25; lElPivot.add(lFA);

    // Right Arm
    rShPivot = new THREE.Group(); rShPivot.position.set(0.3, 0.8, 0); hipGroup.add(rShPivot);
    const rUA = C(0.08, 0.06, 0.5); rUA.position.y = -0.25; rShPivot.add(rUA);
    rElPivot = new THREE.Group(); rElPivot.position.y = -0.5; rShPivot.add(rElPivot);
    const rFA = C(0.06, 0.04, 0.5); rFA.position.y = -0.25; rElPivot.add(rFA);

    // Left Leg
    lHipPivot = new THREE.Group(); lHipPivot.position.set(-0.15, 0, 0); hipGroup.add(lHipPivot);
    const lTh = C(0.12, 0.08, 0.6); lTh.position.y = -0.3; lHipPivot.add(lTh);
    lKneePivot = new THREE.Group(); lKneePivot.position.y = -0.6; lHipPivot.add(lKneePivot);
    const lSh = C(0.08, 0.06, 0.6); lSh.position.y = -0.3; lKneePivot.add(lSh);

    // Right Leg
    rHipPivot = new THREE.Group(); rHipPivot.position.set(0.15, 0, 0); hipGroup.add(rHipPivot);
    const rTh = C(0.12, 0.08, 0.6); rTh.position.y = -0.3; rHipPivot.add(rTh);
    rKneePivot = new THREE.Group(); rKneePivot.position.y = -0.6; rHipPivot.add(rKneePivot);
    const rSh = C(0.08, 0.06, 0.6); rSh.position.y = -0.3; rKneePivot.add(rSh);

    charRoot.position.set(BED_POS.x, CHAR_BED_Y, BED_POS.z - 1.0);
    poseLying();
}

function poseLying() {
    hipGroup.rotation.set(Math.PI/2, 0, 0);
    lHipPivot.rotation.set(0,0,0); rHipPivot.rotation.set(0,0,0);
    lKneePivot.rotation.set(0,0,0); rKneePivot.rotation.set(0,0,0);
    lShPivot.rotation.set(0,0,0); rShPivot.rotation.set(0,0,0);
    lElPivot.rotation.set(0,0,0); rElPivot.rotation.set(0,0,0);
}

function poseSitting() {
    hipGroup.rotation.set(0,0,0);
    lHipPivot.rotation.x = -Math.PI*0.48; rHipPivot.rotation.x = -Math.PI*0.48;
    lKneePivot.rotation.x =  Math.PI*0.52; rKneePivot.rotation.x =  Math.PI*0.52;
    lShPivot.rotation.x = -0.5; rShPivot.rotation.x = -0.5;
    lElPivot.rotation.x = 0.3;  rElPivot.rotation.x = 0.3;
}

function applyWalk(t) {
    const freq = 1.8; // Slower, heavier steps
    const cyc = t * freq * Math.PI * 2;
    const amp = 0.5;

    // Sluggish dragging feet
    lHipPivot.rotation.x  = Math.sin(cyc) * amp;
    rHipPivot.rotation.x  = -Math.sin(cyc) * amp;
    lKneePivot.rotation.x = Math.max(0, -Math.sin(cyc)) * 0.8; // less foot lift
    rKneePivot.rotation.x = Math.max(0, Math.sin(cyc)) * 0.8;
    
    // Creepy stiff, heavy arms
    lShPivot.rotation.x   = -Math.sin(cyc) * 0.15;
    rShPivot.rotation.x   = Math.sin(cyc) * 0.15;
    lShPivot.rotation.z   = 0.15; rShPivot.rotation.z = -0.15;

    hipGroup.rotation.x = -0.35; // extreme forward lean (exhausted)
    
    // Heavy head bobbing
    headMesh.rotation.x = Math.sin(cyc*2) * 0.2;
    headMesh.position.y = 1.1 + Math.sin(cyc*2) * 0.05;

    // Heavy vertical bobbing
    charRoot.position.y = CHAR_STAND_Y + Math.abs(Math.sin(cyc*0.5))*0.05;
}

function lerp(a, b, t) { return a + (b-a) * t; }

function startState(s) {
    loopState = s; stateStart = performance.now()/1000; stateT = 0;
    if(s === 'lying'){
        charRoot.position.set(BED_POS.x, CHAR_BED_Y, BED_POS.z - 1.0);
        charRoot.rotation.y = 0; poseLying();
    }
    if(s === 'walking') { charRoot.rotation.y = -Math.PI/2; walkTime = 0; }
    if(s === 'sitting') {
        charRoot.position.set(DESK_POS.x - 0.2, CHAR_STAND_Y, DESK_POS.z + 0.85);
        charRoot.rotation.y = Math.PI;
    }
}

function updateState(now) {
    const elapsed = now/1000 - stateStart;
    const dur = getDur(loopState) || 0.5;
    stateT = Math.min(Math.max(elapsed / dur, 0), 1);

    if (loopState === 'lying') {
        poseLying();
        if (stateT >= 1) startState('rising');
    }
    else if (loopState === 'rising') {
        hipGroup.rotation.x = lerp(Math.PI/2, 0, stateT);
        charRoot.position.lerpVectors(new THREE.Vector3(BED_POS.x, CHAR_BED_Y, BED_POS.z-1.0), new THREE.Vector3(BED_POS.x+1.5, CHAR_STAND_Y, BED_POS.z), stateT);
        charRoot.rotation.y = lerp(0, -Math.PI/2, stateT);
        lHipPivot.rotation.x = lerp(0, 0, stateT);
        if (stateT >= 1) startState('walking');
    }
    else if (loopState === 'walking') {
        walkTime += 0.016;
        charRoot.position.x = lerp(BED_POS.x+1.5, DESK_POS.x-0.5, stateT);
        charRoot.position.z = BED_POS.z;
        applyWalk(walkTime);
        if (stateT >= 1) startState('arriving');
    }
    else if (loopState === 'arriving') {
        charRoot.position.lerpVectors(new THREE.Vector3(DESK_POS.x-0.5, CHAR_STAND_Y, BED_POS.z), new THREE.Vector3(DESK_POS.x-0.2, CHAR_STAND_Y, DESK_POS.z+0.85), stateT);
        charRoot.rotation.y = lerp(-Math.PI/2, Math.PI, stateT);
        lHipPivot.rotation.x  = lerp(0, -Math.PI*0.48, stateT);
        rHipPivot.rotation.x  = lerp(0, -Math.PI*0.48, stateT);
        lKneePivot.rotation.x = lerp(0,  Math.PI*0.52, stateT);
        rKneePivot.rotation.x = lerp(0,  Math.PI*0.52, stateT);
        hipGroup.rotation.x   = 0;
        charRoot.position.y = CHAR_STAND_Y;
        if (stateT >= 1) startState('sitting');
    }
    else if (loopState === 'sitting' || loopState === 'pause_desk') {
        poseSitting();
        if (stateT >= 1 && loopState === 'sitting') startState('pause_desk');
        if (stateT >= 1 && loopState === 'pause_desk') endLoop();
    }
}

function endLoop() {
    loopCount++;
    speedFactor *= 0.65; // Much faster acceleration
    speedFactor = Math.max(speedFactor, 0.05);

    document.getElementById('loop-counter').textContent = `LOOP ${loopCount}`;

    if(loopCount >= 3) document.getElementById('dox-phase').classList.add('shaking');
    if(loopCount >= 5) document.getElementById('petlya-text').style.color = 'rgba(255,0,51,0.8)';
    if(loopCount >= 7) {
        camZooming = true;
        setTimeout(doMonitorZoom, 200);
        return;
    }
    startState('lying');
}

function doMonitorZoom() {
    const start = performance.now(), duration = 1200;
    const startPos = doxCam.position.clone();
    function animZoom() {
        const t = Math.min((performance.now()-start)/duration, 1);
        const ease = t*t*(3 - 2*t); // smoothstep
        doxCam.position.lerpVectors(startPos, monitorWorldPos, ease);
        doxCam.lookAt(monitorWorldPos);
        doxCam.fov = 60 + t*80; doxCam.updateProjectionMatrix();
        if (t < 1) requestAnimationFrame(animZoom);
        else doFlashToBR();
    }
    animZoom();
}

function doFlashToDesktop() {
    const fl = document.getElementById('flash');
    fl.style.display='block'; fl.style.opacity='1';
    
    // Play breaking dishes / scream audio here (placeholder synth noise for now)
    const osc = new (window.AudioContext || window.webkitAudioContext)().createOscillator();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, 0); osc.frequency.exponentialRampToValueAtTime(1000, 1);
    osc.connect(analyser); osc.start(); osc.stop(1);

    setTimeout(()=>{
        cancelAnimationFrame(doxAnimId); doxRenderer.dispose();
        document.getElementById('dox-phase').style.display='none';
        fl.style.opacity='0';
        setTimeout(()=>{ fl.style.display='none'; startDesktop(); }, 200);
    }, 150);
}

let doxLastTime = 0;
function doxLoop(ts=0) {
    doxAnimId = requestAnimationFrame(doxLoop);
    const dt = ts - doxLastTime; doxLastTime = ts;

    if (!camZooming) {
        // Dynamic Cinematic Camera Tracking
        const intensity = (1 - speedFactor) * 0.5;
        let targetCamPos = new THREE.Vector3();
        let targetLookAt = new THREE.Vector3();

        if (loopState === 'lying' || loopState === 'rising') {
            targetCamPos.set(BED_POS.x - 3, 4, BED_POS.z + 4);
            targetLookAt.set(BED_POS.x, CHAR_BED_Y, BED_POS.z);
        } else if (loopState === 'walking' || loopState === 'arriving') {
            // Follow character from behind and side
            targetCamPos.set(charRoot.position.x - 2.5, 2.0, charRoot.position.z + 3);
            targetLookAt.copy(charRoot.position).add(new THREE.Vector3(0, 1.2, 0));
        } else {
            // Sitting at desk
            targetCamPos.set(DESK_POS.x - 2, 2.5, DESK_POS.z + 2);
            targetLookAt.copy(charRoot.position).add(new THREE.Vector3(0, 1.2, 0));
        }

        // Smoothly interpolate camera
        doxCam.position.lerp(targetCamPos, 0.05);
        
        // Add shake based on speed/tension
        doxCam.position.x += Math.sin(ts*0.01)*intensity;
        doxCam.position.y += Math.cos(ts*0.02)*intensity;
        
        doxCam.lookAt(targetLookAt);
        
        updateState(ts);
    }
    
    // Flicker lights
    if(roomLights[1]) roomLights[1].intensity = Math.random() > 0.9 ? 0 : 1.0;
    if(roomLights[0]) roomLights[0].intensity = 5 + Math.sin(ts*0.05)*2;

    doxRenderer.render(doxScene, doxCam);
}

// ════════════════════════════════════════════════
//  DESKTOP PHASE
// ════════════════════════════════════════════════
function startDesktop() {
    document.getElementById('desktop-phase').style.display = 'block';
    
    const mouse = document.getElementById('fake-mouse');
    const icon = document.getElementById('fake-icon');
    
    // Simulate user grabbing mouse
    setTimeout(()=>{
        mouse.style.top = '60px';
        mouse.style.left = '70px';
    }, 1000);
    
    // Simulate double click
    setTimeout(()=>{
        icon.style.transform = 'scale(0.9)';
        icon.style.filter = 'drop-shadow(0 0 20px #ff0033)';
        setTimeout(()=> icon.style.transform = 'scale(1)', 100);
        setTimeout(()=> icon.style.transform = 'scale(0.9)', 200);
        setTimeout(()=> { icon.style.transform = 'scale(1)'; startFMV(); }, 300);
    }, 3200);
}

// ════════════════════════════════════════════════
//  FMV PHASE (POINT CLOUD PLACEHOLDER)
// ════════════════════════════════════════════════
let fmvCanvas, fmvCtx;
function startFMV() {
    document.getElementById('desktop-phase').style.display = 'none';
    document.getElementById('fmv-phase').style.display = 'block';
    
    const video = document.getElementById('bg-video');
    video.play().catch(e=>console.log("Auto-play blocked"));

    fmvCanvas = document.getElementById('fmv-canvas');
    fmvCtx = fmvCanvas.getContext('2d');
    resizeFMV();
    
    // Start abstract placeholder renderer (Silhouette of dots)
    requestAnimationFrame(renderFMVPlaceholder);
    
    // Lyrics sequence
    const LYRICS = [
        {t: 2000, txt: 'ДЕЖАВЮ'},
        {t: 4000, txt: 'Я СНОВА ЗДЕСЬ'},
        {t: 6000, txt: 'В ПЕТЛЕ'},
        {t: 8000, txt: 'БЕЗ ВЫХОДА'}
    ];
    
    LYRICS.forEach(l => {
        setTimeout(()=>{
            const el = document.getElementById('fmv-lyric');
            el.textContent = l.txt;
            el.style.opacity = 1;
            setTimeout(()=> el.style.opacity = 0, 1500);
        }, l.t);
    });
}

function resizeFMV() {
    if(fmvCanvas) {
        fmvCanvas.width = window.innerWidth;
        fmvCanvas.height = window.innerHeight;
    }
}

function renderFMVPlaceholder(ts) {
    requestAnimationFrame(renderFMVPlaceholder);
    const W = fmvCanvas.width, H = fmvCanvas.height;
    fmvCtx.clearRect(0,0,W,H);
    
    const cx = W/2;
    const cy = H/2 + 100;
    
    // Draw dancing point-cloud silhouette placeholder
    fmvCtx.fillStyle = '#00ffcc';
    const dotSize = 3;
    const spacing = 15;
    
    // Sine wave distortion
    const distortion = Math.sin(ts * 0.005) * 50;
    
    for(let y = -200; y < 200; y += spacing) {
        for(let x = -100; x < 100; x += spacing) {
            // Very rough humanoid mask
            if(Math.abs(x) < 50 || (y < -100 && Math.abs(x) < 30)) {
                // Swaying animation
                const sway = Math.sin(ts * 0.003 + y*0.01) * 30;
                fmvCtx.beginPath();
                fmvCtx.arc(cx + x + sway, cy + y + (Math.random()*5), dotSize, 0, Math.PI*2);
                fmvCtx.fill();
            }
        }
    }
}

window.addEventListener('resize',()=>{
    if(doxCam){ doxCam.aspect=window.innerWidth/window.innerHeight; doxCam.updateProjectionMatrix(); doxRenderer.setSize(window.innerWidth,window.innerHeight); }
    resizeFMV();
});
</script>
