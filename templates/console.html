<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AUREX OS TERMINAL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: #00ffcc; font-family: 'Consolas', monospace; overflow: hidden; }

        /* ─── TERMINAL ─── */
        .console-container { display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        .console-output { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 20px; font-size: 1rem; line-height: 1.6; }
        .console-input-row { display: flex; align-items: center; border-top: 1px dashed #00ffcc44; padding-top: 15px; }
        .console-input { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: 'Consolas', monospace; font-size: 1.2rem; outline: none; margin-left: 10px; }
        .prompt { color: #00ffcc; }

        /* ─── DOX OVERLAY ─── */
        #dive-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 100; display: none; overflow: hidden;
        }
        #particle-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        #loop-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(4rem, 12vw, 10rem);
            color: rgba(255, 0, 51, 0);
            font-weight: 900;
            font-family: 'Consolas', monospace;
            letter-spacing: 20px;
            text-shadow: 0 0 60px red, 0 0 120px red;
            z-index: 5; pointer-events: none;
            text-align: center; width: 100%;
        }
        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            z-index: 6; pointer-events: none; opacity: 0;
        }
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.9) 100%);
            z-index: 4; pointer-events: none;
        }
        #bottom-info {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Consolas', monospace; font-size: 0.9rem;
            color: rgba(0, 255, 204, 0.6); letter-spacing: 3px;
            z-index: 7; text-align: center; opacity: 0; transition: opacity 1s;
        }

        /* Monitor */
        #monitor-scene {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 520px; height: 360px; z-index: 8; display: none;
        }
        #monitor-body {
            width: 100%; height: 100%; background: #0a0a0a;
            border: 16px solid #1c1c1c; border-radius: 12px;
            box-shadow: 0 0 0 2px #333, 0 0 80px rgba(0,255,204,0.3), inset 0 0 40px rgba(0,255,204,0.05);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        #monitor-screen-content {
            width: 100%; height: 100%; display: flex; align-items: flex-start;
            justify-content: flex-start; font-family: 'Consolas', monospace;
            font-size: 0.78rem; color: #00ffcc; padding: 16px; flex-direction: column; gap: 4px;
        }
        .monitor-line { opacity: 0; animation: fadeInLine 0.3s forwards; }
        @keyframes fadeInLine { to { opacity: 1; } }
        #monitor-stand {
            position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 60px solid transparent; border-right: 60px solid transparent; border-top: 70px solid #1c1c1c;
        }
        #monitor-base {
            position: absolute; bottom: -90px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 20px; background: #1c1c1c; border-radius: 4px;
        }
        @keyframes monitorFlyIn {
            0%   { transform: translate(-50%,-50%) translateZ(-3000px) scale(0.1); opacity: 0; }
            15%  { opacity: 1; }
            70%  { transform: translate(-50%,-50%) translateZ(0) scale(1); opacity: 1; }
            85%  { transform: translate(-50%,-50%) translateZ(80px) scale(1.05); }
            100% { transform: translate(-50%,-50%) translateZ(0) scale(1); opacity: 1; }
        }
        .monitor-fly-in { animation: monitorFlyIn 3s cubic-bezier(0.2,0,0.1,1) forwards; }

        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:none; opacity:0; }

        /* ─── BACKROOMS PHASE ─── */
        #backrooms-phase {
            display: none; position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: #000; z-index: 300; overflow: hidden;
        }
        #backrooms-canvas {
            position: absolute; top:0; left:0; width:100%; height:100%; z-index:1;
        }
        /* Floating messages */
        #br-messages {
            position: absolute; top:0; left:0; width:100%; height:100%;
            z-index: 10; pointer-events: none; display: flex;
            align-items: center; justify-content: center;
        }
        .br-msg {
            position: absolute; font-family: 'Consolas', monospace;
            text-align: center; opacity: 0; pointer-events: none;
            transition: opacity 1.5s;
            text-shadow: 0 0 20px currentColor;
            letter-spacing: 4px;
        }
        /* Beat visualizer bar */
        #beat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: transparent; z-index: 20; display: flex; gap: 2px; align-items: flex-end;
        }
        .beat-seg {
            flex: 1; background: #c8a84b; opacity: 0.7;
            transition: height 0.05s; border-radius: 1px 1px 0 0;
        }
        /* Vignette for backrooms */
        #br-vignette {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.7) 100%);
            z-index: 5; pointer-events: none;
        }
        /* Scanlines for backrooms */
        #br-scanlines {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 6px);
            z-index: 6; pointer-events: none; opacity: 0.5;
        }
        /* Restart hint */
        #br-restart {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(200,168,75,0.4); font-family: 'Consolas', monospace;
            font-size: 0.75rem; letter-spacing: 3px; z-index: 20;
            opacity: 0; transition: opacity 2s;
        }

        /* Glitch */
        @keyframes glitchText {
            0%  { transform: translate(0); }
            20% { transform: translate(-3px,1px); filter: hue-rotate(90deg); }
            40% { transform: translate(3px,-1px); color: #ff0033; }
            60% { transform: translate(-2px,2px); }
            80% { transform: translate(2px,-2px); color: #fff; }
            100%{ transform: translate(0); }
        }
        .glitch { animation: glitchText 0.08s infinite; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <!-- ── DOX OVERLAY (phases 1-3) ── -->
    <div id="dive-overlay">
        <canvas id="particle-canvas"></canvas>
        <div id="vignette"></div>
        <div id="scanlines"></div>
        <div id="loop-text">ПЕТЛЯ</div>
        <div id="bottom-info">ДЕЖАВЮ АКТИВИРОВАНО // ЦИКЛ №∞</div>
        <div id="monitor-scene" style="perspective:1200px;">
            <div id="monitor-body">
                <div id="monitor-screen-content"></div>
            </div>
            <div id="monitor-stand"></div>
            <div id="monitor-base"></div>
        </div>
    </div>

    <!-- ── BACKROOMS PHASE (phase 4) ── -->
    <div id="backrooms-phase">
        <canvas id="backrooms-canvas"></canvas>
        <div id="br-vignette"></div>
        <div id="br-scanlines"></div>
        <div id="br-messages"></div>
        <div id="beat-bar"></div>
        <div id="br-restart">[ нажми любую клавишу чтобы выйти ]</div>
    </div>

    <!-- ── TERMINAL ── -->
    <div class="console-container" id="main-console">
        <div style="border-bottom:1px dashed #00ffcc44;padding-bottom:15px;margin-bottom:20px;opacity:0.6;font-size:0.85rem;">
            AUREX OS TERMINAL v2.3 // ПРЯМОЙ ДОСТУП АКТИВИРОВАН<br>
            Введите <span style="color:#fff;">'help'</span> для списка команд. Для запуска протокола Дежавю — <span style="color:#ff0033;">'dox'</span>
        </div>
        <div id="console-output" class="console-output">
            <div style="color:#7f91a4;">&gt; Инициализация консоли... <span style="color:#4caf50;">OK</span></div>
            <div style="color:#7f91a4;">&gt; Подключение к ядру... <span style="color:#4caf50;">OK</span></div>
            <div style="color:#7f91a4;">&gt; Ожидание ввода команды.</div>
        </div>
        <div class="console-input-row">
            <span class="prompt">root@vault:~#</span>
            <input type="text" id="console-input" class="console-input" autocomplete="off" autofocus>
        </div>
    </div>

<script>
// ════════════════════════════════════════
//  TERMINAL
// ════════════════════════════════════════
const consoleInput  = document.getElementById('console-input');
const consoleOutput = document.getElementById('console-output');

consoleInput.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const cmd = this.value.trim();
    this.value = '';
    if (!cmd) return;
    const userLine = document.createElement('div');
    userLine.innerHTML = `<span style="color:#00ffcc;">root@vault:~#</span> <span style="color:#fff;">${cmd}</span>`;
    consoleOutput.appendChild(userLine);
    processCommand(cmd.toLowerCase());
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
});

function addOutput(html, color='#7f91a4') {
    const div = document.createElement('div');
    div.style.color = color;
    div.innerHTML = html;
    consoleOutput.appendChild(div);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
}

function processCommand(cmd) {
    if (cmd === 'help') {
        addOutput(`Доступные команды:<br>
&nbsp;<span style="color:#00ffcc;">help</span>     — Показать это сообщение<br>
&nbsp;<span style="color:#00ffcc;">clear</span>    — Очистить экран<br>
&nbsp;<span style="color:#00ffcc;">history</span>  — История петли<br>
&nbsp;<span style="color:#00ffcc;">glitch</span>   — Визуальный сбой<br>
&nbsp;<span style="color:#ff0033;">dox</span>      — [СЕКРЕТНО] Запустить протокол ДЕЖАВЮ`);
    } else if (cmd === 'clear') {
        consoleOutput.innerHTML = '';
    } else if (cmd === 'history') {
        addOutput('[2021-01-01] Петля запущена.<br>[2024-??-??] Потеря связи с реальностью.<br>[2026-06-24] Хранилище восстановлено.<br>[????-??-??] <span style="color:#ff0033;">ЗАПИСЬ ПОВРЕЖДЕНА</span>');
    } else if (cmd === 'glitch') {
        addOutput('Запуск протокола искажения...', '#ffbb33');
        document.body.classList.add('glitch');
        setTimeout(() => document.body.classList.remove('glitch'), 800);
    } else if (cmd === 'dox') {
        addOutput('<span style="color:#ff0033;">ПРЕДУПРЕЖДЕНИЕ: Протокол ДЕЖАВЮ активирован. Подготовьтесь.</span>');
        setTimeout(triggerDox, 1200);
    } else {
        addOutput(`Команда не найдена: <span style="color:#fff;">${cmd}</span>. Введите 'help'.`);
    }
}

// ════════════════════════════════════════
//  DOX PHASES 1–3 (PARTICLE FIGURE)
// ════════════════════════════════════════
let audioCtx, analyser, audioSource, audioBuffer;
let audioEl = new Audio('/static/assets/loop_music.m4a');
audioEl.loop = true;

let canvas, ctx;
let animId;
let loopSpeed = 1;
let phase = 'walk';
let doxTime = 0;
let particles = [];
let bgParticles = [];

const FIGURE_JOINTS = {
    head:[0.5,0.10], neck:[0.5,0.18],
    lShoulder:[0.38,0.24], rShoulder:[0.62,0.24],
    lElbow:[0.33,0.36], rElbow:[0.67,0.36],
    lHand:[0.30,0.47], rHand:[0.70,0.47],
    hip:[0.5,0.45], lHip:[0.43,0.48], rHip:[0.57,0.48],
    lKnee:[0.40,0.65], rKnee:[0.60,0.65],
    lFoot:[0.37,0.82], rFoot:[0.63,0.82],
};
const BODY_REGIONS = [
    [0.5,0.13,0.06,0.06,25],[0.5,0.32,0.14,0.13,60],
    [0.35,0.29,0.04,0.09,20],[0.65,0.29,0.04,0.09,20],
    [0.31,0.41,0.04,0.08,16],[0.69,0.41,0.04,0.08,16],
    [0.41,0.57,0.05,0.10,22],[0.59,0.57,0.05,0.10,22],
    [0.39,0.73,0.04,0.08,18],[0.61,0.73,0.04,0.08,18],
];

function triggerDox() {
    document.getElementById('main-console').style.display = 'none';
    const overlay = document.getElementById('dive-overlay');
    overlay.style.display = 'block';

    // Start audio + Web Audio API analyzer
    audioEl.play().catch(() => {});
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        audioSource = audioCtx.createMediaElementSource(audioEl);
        audioSource.connect(analyser);
        analyser.connect(audioCtx.destination);
    } catch(e) { /* browser may block */ }

    canvas = document.getElementById('particle-canvas');
    ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    buildParticles();
    buildBgParticles();
    doxTime = 0;
    animateLoop();

    setTimeout(startAccelerate, 4000);
    setTimeout(showMonitor, 13000);
}

function buildParticles() {
    particles = [];
    const W = canvas.width, H = canvas.height;
    const figH = Math.min(H * 0.7, 500);
    const figW = figH * 0.5;
    const figX = W / 2, figY = H * 0.5 - figH * 0.05;
    BODY_REGIONS.forEach(([cx,cy,rx,ry,count]) => {
        for (let i=0; i<count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.random();
            const px = (cx + rx*r*Math.cos(angle))*figW + figX - figW/2;
            const py = (cy + ry*r*Math.sin(angle))*figH + figY - figH/2;
            particles.push({ x:px, y:py, baseX:px, baseY:py,
                regionCY:cy, isLeftSide: cx<0.5,
                size: Math.random()*1.5+0.8,
                brightness: 0.7+Math.random()*0.3,
                phase: Math.random()*Math.PI*2 });
        }
    });
}
function buildBgParticles() {
    bgParticles = [];
    for (let i=0; i<120; i++) bgParticles.push({
        x:Math.random()*canvas.width, y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
        size:Math.random()*1.2+0.3, alpha:Math.random()*0.3+0.05
    });
}

function animateLoop() {
    animId = requestAnimationFrame(animateLoop);
    doxTime += 0.016;
    ctx.fillStyle = `rgba(0,0,0,${phase==='accelerate'?0.25:0.18})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    bgParticles.forEach(p => {
        p.x += p.vx*loopSpeed; p.y += p.vy*loopSpeed;
        if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
        if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,255,204,${p.alpha})`; ctx.fill();
    });

    const t = doxTime * loopSpeed * 1.5;
    const walkBob = Math.sin(t*2)*4*Math.min(loopSpeed,3);
    const walkSway = Math.sin(t)*8*Math.min(loopSpeed,3);
    const figureShiftX = phase==='accelerate' ? Math.min(loopSpeed*2,60)*Math.sin(doxTime*0.5) : 0;

    particles.forEach(p => {
        let offsetX=0, offsetY=0;
        const isLeg = p.regionCY > 0.5;
        const isArm = p.regionCY>0.24 && p.regionCY<0.5 && (p.baseX<canvas.width/2-30||p.baseX>canvas.width/2+30);
        if(isLeg) {
            const legPhase = p.isLeftSide ? t*2 : t*2+Math.PI;
            const legAmp = 15*Math.min(loopSpeed,4);
            offsetX = Math.sin(legPhase)*legAmp*(p.regionCY>0.65?1.2:0.8);
            offsetY = -Math.abs(Math.sin(legPhase))*legAmp*0.4;
        } else if(isArm) {
            const armPhase = p.isLeftSide ? t*2+Math.PI : t*2;
            const armAmp = 10*Math.min(loopSpeed,3);
            offsetX = Math.sin(armPhase)*armAmp;
            offsetY = Math.abs(Math.sin(armPhase))*armAmp*0.3;
        }
        offsetY += walkBob; offsetX += walkSway*0.1+figureShiftX;
        if(phase==='accelerate') {
            const scatter=(loopSpeed-1)*0.5;
            offsetX+=(Math.random()-0.5)*scatter*3;
            offsetY+=(Math.random()-0.5)*scatter*3;
        }
        p.x=p.baseX+offsetX; p.y=p.baseY+offsetY;
        const greenAmt=Math.max(0,255-(loopSpeed-1)*15);
        const redAmt=Math.min(255,(loopSpeed-1)*15);
        const alpha=Math.min(1,p.brightness*(0.6+0.4*Math.abs(Math.sin(doxTime*3+p.phase))));
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(1+(loopSpeed-1)*0.1),0,Math.PI*2);
        ctx.fillStyle=`rgba(${redAmt},${greenAmt},${Math.max(0,200-redAmt)},${alpha})`; ctx.fill();
        if(loopSpeed>10) {
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);
            ctx.fillStyle=`rgba(${redAmt},${greenAmt},0,${0.05*Math.min(loopSpeed/10,1)})`; ctx.fill();
        }
    });

    drawSkeleton(t, walkBob, walkSway, figureShiftX);

    const loopTextEl=document.getElementById('loop-text');
    if(phase==='accelerate') {
        const op=Math.min((loopSpeed-1)/30,1);
        loopTextEl.style.color=`rgba(255,0,51,${op})`;
        loopTextEl.style.textShadow=`0 0 ${30*op}px red,0 0 ${80*op}px red`;
        if(loopSpeed>35) loopTextEl.classList.add('glitch');
    }
}

function drawSkeleton(t,walkBob,walkSway,shiftX) {
    const W=canvas.width, H=canvas.height;
    const figH=Math.min(H*0.7,500), figW=figH*0.5;
    const ox=W/2-figW/2, oy=H*0.5-figH*0.5+walkBob;
    function joint(key) {
        const [nx,ny]=FIGURE_JOINTS[key];
        let dx=0,dy=0;
        if(['lKnee','lFoot'].includes(key)){const p=t*2;dx=Math.sin(p)*15;dy=-Math.abs(Math.sin(p))*6;}
        if(['rKnee','rFoot'].includes(key)){const p=t*2+Math.PI;dx=Math.sin(p)*15;dy=-Math.abs(Math.sin(p))*6;}
        if(['lElbow','lHand'].includes(key)){const p=t*2+Math.PI;dx=Math.sin(p)*8;}
        if(['rElbow','rHand'].includes(key)){const p=t*2;dx=Math.sin(p)*8;}
        return [ox+nx*figW+dx+shiftX, oy+ny*figH+dy+walkBob];
    }
    const greenAmt=Math.max(0,200-(loopSpeed-1)*12);
    const redAmt=Math.min(200,(loopSpeed-1)*12);
    const lineAlpha=Math.max(0.05,0.15-(loopSpeed-1)*0.003);
    ctx.strokeStyle=`rgba(${redAmt},${greenAmt},150,${lineAlpha})`; ctx.lineWidth=1;
    const conns=[['head','neck'],['neck','lShoulder'],['neck','rShoulder'],
        ['lShoulder','lElbow'],['lElbow','lHand'],['rShoulder','rElbow'],['rElbow','rHand'],
        ['neck','hip'],['hip','lHip'],['hip','rHip'],
        ['lHip','lKnee'],['lKnee','lFoot'],['rHip','rKnee'],['rKnee','rFoot']];
    conns.forEach(([a,b])=>{
        const[x1,y1]=joint(a),[x2,y2]=joint(b);
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
    const[hx,hy]=joint('head');
    ctx.beginPath();ctx.arc(hx,hy-figH*0.03,figH*0.045,0,Math.PI*2);ctx.stroke();
}

function startAccelerate() {
    if(canvas.style.display==='none') return;
    phase='accelerate';
    document.getElementById('bottom-info').style.opacity='1';
    document.getElementById('scanlines').style.opacity='0.4';
    const accel=setInterval(()=>{
        loopSpeed+=0.4;
        if(loopSpeed>45) clearInterval(accel);
    },80);
}

function showMonitor() {
    cancelAnimationFrame(animId);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById('bottom-info').style.opacity='0';
    document.getElementById('loop-text').style.opacity='0';
    document.getElementById('scanlines').style.opacity='0';

    const monitorScene=document.getElementById('monitor-scene');
    monitorScene.style.display='block';
    monitorScene.querySelector('#monitor-body').classList.add('monitor-fly-in');

    const lines=[
        '> Протокол ДЕЖАВЮ активирован...',
        '> Поиск начала петли...',
        '> [ОШИБКА] Начало не найдено.',
        '> Переход в Backrooms...',
    ];
    lines.forEach((line,i)=>{
        setTimeout(()=>{
            const el=document.createElement('div');
            el.className='monitor-line';
            el.style.color = i===2?'#ff0033':'#00ffcc';
            el.style.fontSize='0.75rem'; el.style.fontFamily='Consolas,monospace'; el.style.width='100%';
            el.textContent=line;
            document.getElementById('monitor-screen-content').appendChild(el);
        }, i*600+500);
    });

    setTimeout(()=>{
        const flash=document.getElementById('flash');
        flash.style.display='block'; flash.style.opacity='0'; flash.style.transition='opacity 0.4s';
        requestAnimationFrame(()=>{
            flash.style.opacity='1';
            setTimeout(()=>{
                document.getElementById('dive-overlay').style.display='none';
                flash.style.opacity='0';
                setTimeout(()=>{
                    flash.style.display='none';
                    startBackrooms();
                },500);
            },600);
        });
    },5500);
}

// ════════════════════════════════════════
//  BACKROOMS PHASE 4
// ════════════════════════════════════════

// Cinematic script — messages timed to music feel
// Dark ambient = slow, atmospheric, ~142 sec total
// We'll show messages and evolve the corridor over time
const BACKROOMS_SCRIPT = [
    { t:  2, text: 'ТЫ ЗДЕСЬ УЖЕ БЫЛ',        size: '3.5rem', color: '#c8a84b', x:'50%', y:'45%' },
    { t:  7, text: 'ВЫХОДА НЕТ',                size: '5rem',   color: '#ff3333', x:'50%', y:'50%' },
    { t: 14, text: 'сколько раз?',              size: '1.8rem', color: '#c8a84b88', x:'50%', y:'70%' },
    { t: 20, text: 'ты идёшь\nк монитору\nснова', size:'2.2rem', color:'#fff', x:'50%',y:'40%' },
    { t: 30, text: 'ПЕТЛЯ',                     size: '8rem',   color: '#ff0033', x:'50%', y:'50%' },
    { t: 38, text: 'это не первый раз',         size: '1.6rem', color: '#c8a84b', x:'50%', y:'65%' },
    { t: 46, text: 'кто-то уже открыл\nэту страницу', size:'1.9rem', color:'#fff', x:'50%',y:'42%' },
    { t: 55, text: 'ДЕ·ЖА·ВЮ',                 size: '6rem',   color: '#00ffcc', x:'50%', y:'50%' },
    { t: 64, text: 'backrooms уровень 0',       size: '1.5rem', color: '#c8a84b88', x:'50%', y:'80%' },
    { t: 72, text: 'ты не один здесь',          size: '2.5rem', color: '#ff3333', x:'50%', y:'50%' },
    { t: 80, text: 'ДОЖИТЬ ДО КОНЦА ПЕТЛИ',     size: '2rem',   color: '#fff', x:'50%', y:'45%' },
    { t: 90, text: '...',                       size: '4rem',   color: '#c8a84b', x:'50%', y:'50%' },
    { t: 98, text: 'ВОЗВРАЩАЙСЯ',               size: '4.5rem', color: '#00ffcc', x:'50%', y:'50%' },
    { t:110, text: 'ты всегда возвращаешься',   size: '1.8rem', color: '#c8a84b', x:'50%', y:'60%' },
    { t:120, text: '.',                         size: '6rem',   color: '#fff', x:'30%', y:'50%' },
    { t:122, text: '.',                         size: '6rem',   color: '#fff', x:'50%', y:'50%' },
    { t:124, text: '.',                         size: '6rem',   color: '#fff', x:'70%', y:'50%' },
    { t:130, text: 'ПЕТЛЯ НАЧАЛАСЬ СНОВА',      size: '2.8rem', color: '#ff0033', x:'50%', y:'50%' },
];

let brCanvas, brCtx;
let brTime = 0;
let brAnimId;
let brZoom = 1.0;
let brFlicker = 1.0;
let brShownMessages = new Set();
let freqData;

// Corridor geometry constants
const CORRIDOR = {
    wallColor:   '#c8a84b',   // backrooms yellow
    ceilColor:   '#a88a30',
    floorColor:  '#6b5a20',
    lightColor:  '#ffe8a0',
    fogColor:    '#1a1400',
};

function startBackrooms() {
    const phase4 = document.getElementById('backrooms-phase');
    phase4.style.display = 'block';

    brCanvas = document.getElementById('backrooms-canvas');
    brCtx = brCanvas.getContext('2d');
    brCanvas.width = window.innerWidth;
    brCanvas.height = window.innerHeight;

    // Setup beat analyser data array
    if (analyser) {
        freqData = new Uint8Array(analyser.frequencyBinCount);
    }

    // Beat segments
    const beatBar = document.getElementById('beat-bar');
    const segCount = 40;
    for (let i=0; i<segCount; i++) {
        const seg = document.createElement('div');
        seg.className = 'beat-seg';
        beatBar.appendChild(seg);
    }

    // Exit on keypress
    document.addEventListener('keydown', exitBackrooms, {once:true});

    brTime = 0;
    brZoom = 1.0;
    renderBackrooms();

    // Show hint after 30s
    setTimeout(()=>{
        document.getElementById('br-restart').style.opacity='1';
    }, 30000);
}

function exitBackrooms() {
    cancelAnimationFrame(brAnimId);
    audioEl.pause(); audioEl.currentTime = 0;
    document.getElementById('backrooms-phase').style.display='none';
    document.getElementById('main-console').style.display='flex';
    addOutput('<span style="color:#00ffcc;">&gt; Протокол завершён. Добро пожаловать обратно.</span>');
}

function renderBackrooms() {
    brAnimId = requestAnimationFrame(renderBackrooms);
    brTime += 0.016;

    const W = brCanvas.width, H = brCanvas.height;

    // Get beat data
    let bass = 0, mid = 0;
    if (analyser && freqData) {
        analyser.getByteFrequencyData(freqData);
        for (let i=0; i<4; i++) bass += freqData[i];
        for (let i=4; i<20; i++) mid += freqData[i];
        bass = bass / 4 / 255;
        mid = mid / 16 / 255;

        // Update beat bar
        const segs = document.querySelectorAll('.beat-seg');
        segs.forEach((seg, i) => {
            const val = freqData[Math.floor(i * analyser.frequencyBinCount / segs.length)] / 255;
            seg.style.height = (val * 40 + 1) + 'px';
            const hue = 40 + val * 20;
            seg.style.background = `hsl(${hue}, 80%, ${30 + val*40}%)`;
        });
    } else {
        // Fake gentle pulse if no analyser
        bass = (Math.sin(brTime*0.8)*0.1 + 0.15);
        mid  = (Math.sin(brTime*1.3)*0.05 + 0.1);
    }

    // Slow zoom in — we "walk" deeper
    brZoom += 0.0003 + bass * 0.002;
    if (brZoom > 2.5) brZoom = 1.0; // reset (loop feel)

    // Flicker effect
    if (Math.random() < 0.015) brFlicker = 0.3 + Math.random()*0.4;
    else brFlicker = Math.min(brFlicker + 0.08, 1.0);

    // Light pulse with music
    const lightPulse = 1.0 + bass * 0.4;

    // ── Draw corridor ──
    drawCorridor(W, H, brZoom, brFlicker, lightPulse, bass);

    // ── Chromatic aberration glitch on bass hits ──
    if (bass > 0.5) {
        brCtx.save();
        brCtx.globalAlpha = 0.15 * bass;
        brCtx.globalCompositeOperation = 'screen';
        const shift = bass * 8;
        brCtx.drawImage(brCanvas, -shift, 0);
        brCtx.restore();
    }

    // ── Show script messages ──
    BACKROOMS_SCRIPT.forEach(item => {
        if (brTime >= item.t && !brShownMessages.has(item.t)) {
            brShownMessages.add(item.t);
            showBrMessage(item);
        }
    });
}

function drawCorridor(W, H, zoom, flicker, lightPulse, bass) {
    brCtx.clearRect(0,0,W,H);

    const cx = W/2, cy = H/2;

    // Zoom matrix — make it feel like walking forward
    brCtx.save();
    const s = zoom;
    brCtx.translate(cx, cy);
    brCtx.scale(s, s);
    brCtx.translate(-cx, -cy);

    // --- Background / fog ---
    brCtx.fillStyle = CORRIDOR.fogColor;
    brCtx.fillRect(0,0,W,H);

    // --- Draw recursive corridor boxes (perspective) ---
    const levels = 8;
    for (let i = levels; i >= 0; i--) {
        const t = i / levels; // 0 = far, 1 = near
        const t2 = t * t;

        const roomW = W * 0.55 * t + W * 0.08 * (1-t);
        const roomH = H * 0.65 * t + H * 0.12 * (1-t);
        const rx = cx - roomW/2;
        const ry = cy - roomH/2;

        // Brightness based on distance + flicker + beat
        const baseBrightness = 0.1 + t2 * 0.7;
        const brightness = baseBrightness * flicker * lightPulse;

        // Floor
        const floorGrad = brCtx.createLinearGradient(0, cy, 0, H);
        floorGrad.addColorStop(0, `rgba(107, 90, 32, ${brightness * 0.5})`);
        floorGrad.addColorStop(1, `rgba(40, 30, 5, ${brightness * 0.3})`);
        brCtx.fillStyle = floorGrad;
        brCtx.fillRect(rx, cy + roomH/2, roomW, (H - cy - roomH/2));

        // Ceiling
        const ceilGrad = brCtx.createLinearGradient(0, 0, 0, cy);
        ceilGrad.addColorStop(0, `rgba(40, 30, 5, ${brightness * 0.2})`);
        ceilGrad.addColorStop(1, `rgba(168, 138, 48, ${brightness * 0.45})`);
        brCtx.fillStyle = ceilGrad;
        brCtx.fillRect(rx, 0, roomW, ry);

        // Left wall
        const lwGrad = brCtx.createLinearGradient(0, 0, cx, 0);
        lwGrad.addColorStop(0, `rgba(30, 22, 2, ${brightness * 0.2})`);
        lwGrad.addColorStop(1, `rgba(180, 150, 50, ${brightness * 0.5})`);
        brCtx.fillStyle = lwGrad;
        brCtx.fillRect(0, ry, rx, roomH);

        // Right wall
        const rwGrad = brCtx.createLinearGradient(cx, 0, W, 0);
        rwGrad.addColorStop(0, `rgba(180, 150, 50, ${brightness * 0.5})`);
        rwGrad.addColorStop(1, `rgba(30, 22, 2, ${brightness * 0.2})`);
        brCtx.fillStyle = rwGrad;
        brCtx.fillRect(rx+roomW, ry, W-(rx+roomW), roomH);

        // Corridor border lines
        brCtx.strokeStyle = `rgba(200, 168, 75, ${brightness * 0.4})`;
        brCtx.lineWidth = 1.5;
        brCtx.strokeRect(rx, ry, roomW, roomH);

        // Fluorescent lights on ceiling (every other level)
        if (i % 2 === 0 && t > 0.1) {
            const lightW = roomW * 0.25;
            const lightH = 6 * t;
            const lightX = cx - lightW/2;
            const lightY = ry + 2;

            // Glow
            const lightAlpha = brightness * lightPulse * 0.8 * (0.9 + Math.sin(brTime*3)*0.1);
            brCtx.shadowColor = CORRIDOR.lightColor;
            brCtx.shadowBlur = 30 * t * lightPulse;
            brCtx.fillStyle = `rgba(255, 232, 160, ${lightAlpha})`;
            brCtx.fillRect(lightX, lightY, lightW, lightH);
            brCtx.shadowBlur = 0;

            // Light cone on floor
            if (t > 0.4) {
                const coneGrad = brCtx.createRadialGradient(cx, cy-roomH*0.4, 0, cx, cy, roomH*0.8);
                coneGrad.addColorStop(0, `rgba(255, 232, 160, ${lightAlpha * 0.3})`);
                coneGrad.addColorStop(1, 'rgba(255,232,160,0)');
                brCtx.fillStyle = coneGrad;
                brCtx.beginPath();
                brCtx.moveTo(lightX, lightY+lightH);
                brCtx.lineTo(lightX-roomW*0.1, cy+roomH/2);
                brCtx.lineTo(lightX+lightW+roomW*0.1, cy+roomH/2);
                brCtx.lineTo(lightX+lightW, lightY+lightH);
                brCtx.closePath();
                brCtx.fill();
            }
        }

        // Floor grid lines (perspective)
        if (i > 0 && t > 0.05) {
            const prevT = (i-1)/levels;
            const prevRoomW = W*0.55*prevT + W*0.08*(1-prevT);
            const prevRy = cy - (H*0.65*prevT + H*0.12*(1-prevT))/2;
            const prevRx = cx - prevRoomW/2;

            brCtx.strokeStyle = `rgba(107,90,32,${brightness*0.25})`;
            brCtx.lineWidth = 0.5;
            brCtx.beginPath();
            // Floor lines
            brCtx.moveTo(rx, cy+roomH/2); brCtx.lineTo(prevRx, cy+(H*0.65*prevT+H*0.12*(1-prevT))/2);
            brCtx.moveTo(rx+roomW, cy+roomH/2); brCtx.lineTo(prevRx+prevRoomW, cy+(H*0.65*prevT+H*0.12*(1-prevT))/2);
            brCtx.stroke();
        }
    }

    // Silhouette figure walking away in the distance
    drawDistantFigure(cx, cy, bass);

    brCtx.restore();

    // --- Vignette pulse with bass ---
    const vigGrad = brCtx.createRadialGradient(cx,cy,H*0.1, cx,cy,H*0.8);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, `rgba(0,0,0,${0.7 + bass*0.2})`);
    brCtx.fillStyle = vigGrad;
    brCtx.fillRect(0,0,W,H);

    // --- Noise / grain overlay ---
    if (Math.random() < 0.4) {
        brCtx.save();
        brCtx.globalAlpha = 0.03;
        for (let i=0; i<300; i++) {
            const gx = Math.random()*W, gy = Math.random()*H;
            const gs = Math.random()*2;
            const gv = Math.floor(Math.random()*200);
            brCtx.fillStyle = `rgb(${gv},${gv},${gv})`;
            brCtx.fillRect(gx,gy,gs,gs);
        }
        brCtx.restore();
    }
}

function drawDistantFigure(cx, cy, bass) {
    // Small silhouette far away that slowly walks
    const figT = brTime * 0.05;
    const figSize = 30 + bass * 8;
    const figY = cy + 5;
    const figX = cx + Math.sin(figT * 0.3) * 15;

    const alpha = 0.15 + bass * 0.15;

    // Body
    brCtx.save();
    brCtx.strokeStyle = `rgba(200,168,75,${alpha})`;
    brCtx.lineWidth = 1.5;
    brCtx.shadowColor = '#c8a84b';
    brCtx.shadowBlur = 5;

    const walkPhase = figT * 8;
    const headR = figSize * 0.12;
    const headY = figY - figSize * 0.5;

    // Head
    brCtx.beginPath();
    brCtx.arc(figX, headY, headR, 0, Math.PI*2);
    brCtx.stroke();

    // Torso
    brCtx.beginPath();
    brCtx.moveTo(figX, headY+headR);
    brCtx.lineTo(figX, figY - figSize*0.15);
    brCtx.stroke();

    // Arms
    const armSwing = Math.sin(walkPhase) * figSize * 0.15;
    brCtx.beginPath();
    brCtx.moveTo(figX, headY+headR+figSize*0.05);
    brCtx.lineTo(figX - figSize*0.12 - armSwing, figY - figSize*0.2);
    brCtx.stroke();
    brCtx.beginPath();
    brCtx.moveTo(figX, headY+headR+figSize*0.05);
    brCtx.lineTo(figX + figSize*0.12 + armSwing, figY - figSize*0.2);
    brCtx.stroke();

    // Legs
    const legSwingL = Math.sin(walkPhase) * figSize * 0.18;
    const legSwingR = Math.sin(walkPhase+Math.PI) * figSize * 0.18;
    brCtx.beginPath();
    brCtx.moveTo(figX, figY-figSize*0.15);
    brCtx.lineTo(figX - figSize*0.06 + legSwingL, figY+figSize*0.18);
    brCtx.stroke();
    brCtx.beginPath();
    brCtx.moveTo(figX, figY-figSize*0.15);
    brCtx.lineTo(figX + figSize*0.06 + legSwingR, figY+figSize*0.18);
    brCtx.stroke();

    brCtx.restore();
}

function showBrMessage(item) {
    const container = document.getElementById('br-messages');
    const el = document.createElement('div');
    el.className = 'br-msg';
    el.style.left = item.x;
    el.style.top = item.y;
    el.style.transform = 'translate(-50%,-50%)';
    el.style.fontSize = item.size;
    el.style.color = item.color;
    el.style.whiteSpace = 'pre-line';
    el.style.lineHeight = '1.3';
    el.textContent = item.text;

    // Big messages get extra styling
    if (parseFloat(item.size) >= 4) {
        el.style.fontWeight = '900';
        el.style.letterSpacing = '8px';
    }

    container.appendChild(el);

    // Fade in
    requestAnimationFrame(()=>{ el.style.opacity='1'; });

    // Fade out after display time
    const duration = item.text.length < 5 ? 2500 : Math.min(item.text.length * 120, 7000);
    setTimeout(()=>{
        el.style.opacity='0';
        setTimeout(()=>el.remove(), 1600);
    }, duration);
}

window.addEventListener('resize', ()=>{
    if(brCanvas){ brCanvas.width=window.innerWidth; brCanvas.height=window.innerHeight; }
    if(canvas){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
});
</script>
