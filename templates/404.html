<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 404 | Aurexis Studio</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505; /* Hardcoded dark background */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 0, 85, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
            color: #ffffff;
        }
        
        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .error-container {
            z-index: 10;
            position: relative;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(255, 0, 85, 0.3);
            padding: 60px 80px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.1), inset 0 0 20px rgba(255, 0, 85, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 3px #ff0055;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
            letter-spacing: -5px;
            animation: pulse 2s infinite alternate;
        }
        
        .error-text {
            font-size: 1.8rem;
            color: #fff;
            margin-top: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
        }
        
        .error-desc {
            color: #a0a0b0;
            margin-bottom: 40px;
            font-size: 1rem;
            line-height: 1.5;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn-home {
            display: inline-block;
            background: transparent;
            border: 2px solid #ff0055;
            color: #ff0055;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }
        
        .btn-home:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
            100% { text-shadow: 0 0 40px rgba(255, 0, 85, 0.8), 0 0 80px rgba(255, 0, 85, 0.4); }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <div class="error-text">Сектор не найден</div>
        <p class="error-desc">Похоже, вы забрели в неизвестную часть киберпространства. Запрошенная страница удалена или никогда не существовала.</p>
        <a href="/" class="btn-home">Вернуться на Базу</a>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', '/static/particles.json');
    </script>
</body>
</html>
