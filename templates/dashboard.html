<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AUREX DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="dashboard-body">
    <!-- CUSTOM CURSOR -->
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <!-- ANIMATED BACKGROUND CONTAINERS -->
    <canvas id="bg-canvas"></canvas>
    <div id="bg-css-layer"></div>
    <div id="bg-overlay"></div> <!-- Color tint -->

    <!-- MEGA SIDE PANEL (HOVER) -->
    <div class="side-panel" id="side-panel">
        <div class="side-panel-content">
            
            <!-- HEADER (PROFILE) -->
            <div class="panel-header glass-dark">
                <img id="header-avatar" src="/static/assets/default-avatar.png">
                <div class="header-info">
                    <div id="header-name">LOADING...</div>
                    <div class="header-status">В СИСТЕМЕ</div>
                </div>
            </div>

            <!-- TABS NAVIGATION -->
            <div class="panel-nav">
                <div class="nav-tab active" onclick="switchTab('telegram')">📝 ПРОФИЛЬ</div>
                <div class="nav-tab" onclick="switchTab('panel')">🌐 ПАНЕЛЬ</div>
                <div class="nav-tab" onclick="switchTab('themes')">🎨 ОБОИ</div>
            </div>

            <!-- TAB CONTENT: TELEGRAM PROFILE -->
            <div id="tab-telegram" class="tab-content active">
                <div class="tg-profile-editor">
                    <div class="tg-avatar-wrapper">
                        <img id="tg-avatar-img" src="/static/assets/default-avatar.png">
                        <button class="tg-btn" onclick="document.getElementById('tg-file').click()">Сменить фото</button>
                        <input type="file" id="tg-file" style="display:none" accept="image/*" onchange="updateAvatar(this)">
                    </div>
                    <div class="tg-info">
                        <label>Имя пользователя</label>
                        <input type="text" id="tg-name" class="tg-input" placeholder="Введите имя...">
                        <label>О себе (Bio)</label>
                        <textarea id="tg-bio" class="tg-input" placeholder="Напишите что-нибудь о себе..."></textarea>
                        
                        <button class="tg-btn primary" onclick="saveTelegram()">СОХРАНИТЬ</button>
                        <span id="tg-save-status"></span>
                    </div>
                </div>
            </div>

            <!-- TAB CONTENT: PANEL -->
            <div id="tab-panel" class="tab-content" style="display:none;">
                <div class="panel-stats glass-dark">
                    <div class="stat-box">
                        <h4>СТАТУС СЕТИ</h4>
                        <div style="color:#00ffcc; font-weight:bold; text-shadow:0 0 10px #00ffcc;">[ АКТИВНО ]</div>
                    </div>
                    <div class="stat-box">
                        <h4>PING</h4>
                        <div id="ping-count" style="color:#ff00ff; font-weight:bold; text-shadow:0 0 10px #ff00ff;">12 ms</div>
                    </div>
                    <div class="stat-box">
                        <h4>ТРАФИК</h4>
                        <div id="traffic" style="color:#fff; font-weight:bold;">1.2 TB/s</div>
                    </div>
                </div>
                
                <div class="panel-meters glass-dark" style="margin-top:20px; padding:20px;">
                    <div class="meter-wrap">
                        <div class="meter-label">НАГРУЗКА ЦП</div>
                        <div class="meter-bar"><div class="meter-fill" id="cpu-fill" style="width:45%; background:#00ffcc;"></div></div>
                    </div>
                    <div class="meter-wrap" style="margin-top:15px;">
                        <div class="meter-label">ОЗУ (RAM)</div>
                        <div class="meter-bar"><div class="meter-fill" id="ram-fill" style="width:78%; background:#ff0033;"></div></div>
                    </div>
                </div>
                
                <div class="panel-card glass-dark" style="height: 250px; position:relative; overflow:hidden; margin-top:20px;" id="globe-container">
                    <div style="position:absolute; top:15px; left:20px; z-index:10;">
                        <h4 style="color:#fff; letter-spacing:2px; font-size:14px; text-shadow:0 0 5px #000;">ГЛОБАЛЬНАЯ СЕТЬ</h4>
                    </div>
                    <!-- 3D GLOBE -->
                </div>

                <div class="panel-card glass-dark" style="margin-top:20px;">
                    <h4 style="color:#00ffcc; font-size:12px; margin-bottom:10px; letter-spacing:1px;">ТЕРМИНАЛ ПРОЦЕССОВ</h4>
                    <div id="fake-logs" style="height: 120px; overflow:hidden; font-size:11px; font-family:monospace; color:#00ffcc; text-shadow:0 0 5px rgba(0,255,204,0.5);"></div>
                </div>
            </div>

            <!-- TAB CONTENT: THEMES -->
            <div id="tab-themes" class="tab-content" style="display:none;">
                <div class="settings-group glass-dark" style="padding:20px; border-radius:12px;">
                    <h4>Цветовой Фильтр (Тинт)</h4>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="color" id="tint-color" value="#000000" onchange="updateTint()">
                        <input type="range" id="tint-opacity" min="0" max="1" step="0.1" value="0.5" onchange="updateTint()" style="flex:1;">
                    </div>
                </div>
                
                <div class="settings-group" style="margin-top:20px;">
                    <h4>ЖИВЫЕ ОБОИ (АНИМАЦИИ)</h4>
                    <div class="bg-grid" id="bg-grid">
                        <!-- Buttons populated by JS -->
                    </div>
                </div>
            </div>
            
            <button class="logout-btn" onclick="logout()">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
        
        <div class="side-panel-handle">
            <span>⚙️ SYSTEM MENU</span>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
