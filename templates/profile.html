<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ target_user.nickname }} | Aurexis Studio</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 100px auto;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--neon-primary);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.5);
        }
        .profile-nick {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .profile-user {
            color: var(--neon-purple);
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(112, 0, 255, 0.2);
            border: 1px solid var(--neon-primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .badge.admin {
            background: rgba(255, 0, 85, 0.2);
            border-color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }
        .badge.flora {
            background: rgba(0, 255, 170, 0.2);
            border-color: #00ffaa;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.4);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="profile-container">
        {% if target_user.avatar %}
            <img src="{{ target_user.avatar }}" alt="Avatar" class="profile-avatar">
        {% else %}
            <img src="{{ url_for('static', filename='assets/default-avatar.png') }}" alt="Avatar" class="profile-avatar">
        {% endif %}
        
        <h1 class="profile-nick">{{ target_user.nickname }}</h1>
        <p class="profile-user">{{ target_user.username or '@user' }}</p>
        
        <div class="badges">
            {% if target_user.is_admin %}
                <div class="badge admin">🛡️ Администратор</div>
            {% endif %}
            {% if target_user.flora_status %}
                <div class="badge flora">🌿 AUREXIS FLORA</div>
            {% endif %}
            <div class="badge">Пользователь</div>
        </div>

        <a href="/" class="back-btn">← Вернуться на сайт</a>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', '{{ url_for("static", filename="particles.json") }}', function() {
            console.log('particles.js loaded - profile');
        });
    </script>
</body>
</html>
